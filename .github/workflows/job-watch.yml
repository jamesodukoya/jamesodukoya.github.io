# Place this file at .github/workflows/job-watch.yml in your repo
# (the same repo your roadmap site already lives in works fine).
#
# One-time setup:
#   1. Repo → Settings → Secrets and variables → Actions → New repository secret
#      NTFY_TOPIC             = something-hard-to-guess-like-dara-jobwatch-9f3k
#      ADZUNA_APP_ID           = (optional — free at developer.adzuna.com; Layer 2 only)
#      ADZUNA_APP_KEY          = (optional — same registration)
#      SUPABASE_URL            = (optional — enables the jobs.html "for later" page)
#      SUPABASE_SERVICE_KEY    = (optional — the service_role key, NOT anon.
#                                 Dashboard → Project Settings → API. Never put
#                                 this one in client-side HTML, only here.)
#   2. Subscribe to your NTFY_TOPIC in the ntfy app (iOS/Android) or at
#      https://ntfy.sh/<same-topic> in a browser, so you get the push.
#   3. Commit job_watch.py at the repo root (or update the `python` line
#      below if you put it somewhere else).
#   4. If using Supabase: run supabase_setup.sql once in your project's SQL
#      editor, then fill in SUPABASE_URL and SUPABASE_ANON_KEY (the public
#      one this time) at the top of jobs.html and commit it normally —
#      that's a one-time, ordinary commit, not something this workflow
#      ever touches.
#
# Adzuna and Supabase are both optional: skip their secrets and the script
# logs a skip notice for that piece and keeps running everything else.
# Every other Layer 2 source (RemoteOK, Remotive, HN Who's Hiring) needs no
# key at all.
#
# State (seen_jobs.json) is kept in the GitHub Actions cache, NOT committed
# to the repo. That's deliberate: a bot that commits to the same branch you
# develop on will eventually collide with your own pushes (exactly the
# "non-fast-forward" error you'd get if it committed to main while you had
# local commits in flight). The cache restore/save pattern below persists
# state across runs without ever touching git history, so this workflow
# can run on its own schedule with zero interaction with your normal
# git workflow — no permissions on the repo needed either.
#
# This runs unattended, on GitHub's infrastructure, at no cost for a
# public repo.

name: Job Watch

on:
  schedule:
    - cron: "*/15 * * * *"   # every 15 minutes. GitHub may delay a few
                              # minutes under load; it will never be slower
                              # than that on its own. Layer 2 sources
                              # self-throttle far below this cadence — see
                              # AGGREGATOR_FETCHERS in job_watch.py.
  workflow_dispatch: {}      # lets you trigger a run manually from the
                              # Actions tab to test it immediately

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Restores the most recent seen_jobs.json saved by a prior run.
      # restore-keys does a prefix match, so it finds the latest save even
      # though the exact key (below) is unique to this run and won't exist
      # yet at restore time. If no cache exists at all (first-ever run),
      # this is a harmless no-op and job_watch.py starts with a clean state.
      - name: Restore job-watch state
        uses: actions/cache/restore@v4
        with:
          path: seen_jobs.json
          key: job-watch-state-${{ github.run_id }}
          restore-keys: |
            job-watch-state-

      - name: Run job watch
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python job_watch.py

      # Saves under a key unique to this run, so next run's restore-keys
      # prefix match picks THIS one up as the newest. Nothing here ever
      # touches the repo's git history.
      - name: Save job-watch state
        uses: actions/cache/save@v4
        with:
          path: seen_jobs.json
          key: job-watch-state-${{ github.run_id }}