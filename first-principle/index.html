ution shift","Python for orchestration (AI-scaffolded) + a results store; Isaac Lab/Sim for the training/scenario side","DOE tooling (scipy.stats.qmc); GSN for the assurance case"],"why":"Validating a SELF-LEARNING system is the most defensible role in the AI era and the live frontier of safety practice: the bottleneck is judgment about WHAT to test, WHAT counts as a pass, and WHY anyone should trust a controller that changes itself — none of which automates. This build takes the adaptive/learned controller you designed in this phase and surrounds it with coverage strategy, oracle design, DOE-based scenario sampling, mutation-based meta-validation (including adaptation-instability and sim-to-real distribution-shift faults), and a NASA-STD-7009/GSN/SOTIF-style credibility case. It is the artifact that separates the engineer who can DEPLOY learning control in safety-critical systems from one who can only demo it in sim.","modules":[{"name":"Module 1: Test strategy & requirements for a learning system","tech":"Strategy doc / RTM","tasks":[{"id":"t3m1-1","text":"Write the test strategy: the test pyramid for this adaptive system, open-loop vs closed-loop choices, and the cost/fidelity tradeoff at each level. State explicitly what changes when the system-under-test adapts itself between runs."},{"id":"t3m1-2","text":"Build the requirements-to-tests-to-scenarios traceability matrix; flag any requirement with no linked test as an unmanaged risk. Include the requirement that the learned law must never violate the fixed-gain stability envelope."}]},{"name":"Module 2: Oracle design","tech":"Multi-criterion oracle","tasks":[{"id":"t3m2-1","text":"Design a multi-criterion oracle: correctness + performance + quality/comfort + safety-margin. Justify each criterion, and add one that only a learning system needs — bounded adaptation (the parameters never leave a safe set)."},{"id":"t3m2-2","text":"Set every threshold BEFORE running anything, and record the rationale. Post-hoc thresholds are how teams fool themselves — and a self-tuning system makes that temptation worse."}]},{"name":"Module 3: Scenario & DOE campaign","tech":"scipy.stats.qmc / Isaac Lab / combinatorial","tasks":[{"id":"t3m3-1","text":"Define the parameter space (drift, faults, environment) and a coverage definition that actually bounds risk — not just 'we ran many cases.'"},{"id":"t3m3-2","text":"Choose a sampling plan (Latin Hypercube / Sobol) and DEFEND the sample count against the cost-per-run; relate it to the domain-randomization distribution you trained against."},{"id":"t3m3-3","text":"Run the campaign (AI-scaffold the orchestration, in sim and on the bench) and own the interpretation of the results, not the plumbing."}]},{"name":"Module 4: Meta-validation","tech":"Mutation / fault injection","tasks":[{"id":"t3m4-1","text":"Design 5 fault mutations and predict which tests SHOULD catch each. Draw at least 3 from real failure modes you identified earlier: RTK fix loss, ELRS failsafe trigger, EDF/ESC overcurrent — and add two that only a learning system has: adaptation instability (parameter drift / bursting) and sim-to-real distribution shift."},{"id":"t3m4-2","text":"Run the suite against each mutation; report which faults were caught and which slipped — and fix the gaps in the suite."}]},{"name":"Module 5: Uncertainty & coverage analytics","tech":"Python / pandas / plots","tasks":[{"id":"t3m5-1","text":"Report campaign results WITH uncertainty, not as bare pass/fail counts."},{"id":"t3m5-2","text":"Produce a coverage map that distinguishes tested-safe, tested-unsafe, and untested regions — and say what the untested regions mean for risk. Mark the region where the learned law has never been excited as explicitly untrusted."}]},{"name":"Module 6: The credibility case","tech":"GSN / NASA-STD-7009 / SOTIF","tasks":[{"id":"t3m6-1","text":"Write a GSN assurance argument: the top claim ('this self-learning controller is safe to fly within its ODD'), the sub-claims, and the evidence that supports each — including the runtime monitor and fixed-gain fallback."},{"id":"t3m6-2","text":"Write the NASA-7009 / SOTIF-style credibility memo for the whole system — the document that gets you hired to OWN safety for a learning system, not merely to run its tests."}]}]}],"milestones":["Can define model/simulation/shadow/twin precisely and trace the twin's lineage to the Kalman observer","Wrote the sensor-fusion ownership memo and RTK-loss contingency, and tied the EKF innovation to the twin's drift detector","Deployed one model with TensorRT on the Jetson, measured the latency/accuracy tradeoff, and gave it a quantified measurement model","Wrote the rule for where ML may and may not sit in the control loop, grounded in the hard/soft real-time boundary and SOTIF","Designed an MRAC (or RL) law for a drifting plant, proved boundedness, and compared three roads to adaptation with a certification verdict","Measured a real sim-to-real gap in Isaac Lab and stated its equivalence to the twin's reconciliation residual","Built the integrity-level cross-walk (ASIL/DAL/SIL), ran an STPA, and wrote a GSN assurance case for a learning system","Completed Signature Builds 2 and 3: a living twin and a self-learning controller with a SOTIF-style credibility case","Published the sim-to-real reframe, the edge-latency benchmark, and the live-twin demo"]},{"id":"p4","label":"Phase 4","title":"Consultant · Founder · Thought Leader","months":"Months 9–10","color":"#10B981","icon":"⬢","desc":"Convert capability into reputation, leverage, and the highest-paying engagements. Package the three signature builds as consulting-grade proof, consolidate the per-phase posts into a coherent body of public work, learn the economics and positioning of independent technical consulting and product ventures, and prepare to interview — and negotiate — as a systems thinker for staff/principal/architect roles across the Physical-AI, robotics, aerospace, automotive and industrial worlds. The work here is judgment, communication and positioning — the most automation-proof skills of all.","sections":[{"title":"The Signature Portfolio (proof, not homework)","items":[{"id":"p4-port-1","text":"Frame each of the 3 builds as a case study: problem, modeling decisions, V&V evidence, result, and what you would do differently. Hiring managers and clients buy decisions and judgment, not line counts."},{"id":"p4-port-2","text":"For each build, publish the credibility argument and the validity boundary, not just the demo. The willingness to state what your system CANNOT do is the strongest trust signal you can send to a senior reviewer or client — especially for the self-learning Build 3."},{"id":"p4-port-3","text":"Record a 10-minute architecture walkthrough per build (whiteboard or slides): the data flow, the single hardest tradeoff, and the one bug your V&V caught that naive testing missed. This is the artifact that wins technical screens."},{"id":"p4-port-4","text":"One-command reproducibility: make each build run from a single command, with AI-scaffolded plumbing. A reviewer should reach your THINKING in under five minutes — the code is just the vehicle."}]},{"title":"Thought Leadership & Writing (consolidate the leverage)","items":[{"id":"p4-think-1","text":"Consolidate your per-phase posts into 6 flagship essays (LinkedIn / Substack / a personal site), each teaching ONE hard-won idea: why fit is not validation; the observer is the original digital twin AND adaptive controller; the sim-to-real gap IS the twin's reconciliation residual; where ML may and may not sit in a control loop (SOTIF); the Brain/Spine pattern for deterministic + learned control; what chaos means for twin prediction horizons. Teaching is how expertise compounds into reputation."},{"id":"p4-think-2","text":"Give one talk or workshop (a local meetup, a ROS/robotics community event, a university guest lecture, or a recorded session) on adaptive control, edge-AI determinism, or twin V&V. Speaking forces clarity and builds the public record consultants and thought leaders live on."},{"id":"p4-think-3","text":"Make one substantive open contribution — an FMI reference example, an OpenModelica/INTO-CPS model, an Isaac Lab/Isaac ROS scenario, a PX4/ROS 2 bridge improvement, or a fix to a standards-adjacent tool. Credibility by contribution is cheaper to earn than credibility by credential.","link":"https://fmi-standard.org/"},{"id":"p4-think-4","text":"Build a simple personal site that positions you in one sentence — e.g. 'I model, validate, and adaptively control self-learning electro-mechanical systems across domains' — with the essays and case studies as the evidence beneath it. Positioning is itself a deliverable."}]},{"title":"The Consulting & Entrepreneurship Path","items":[{"id":"p4-cons-1","text":"Map the value ladder: staff role (sell time at a premium), fractional/advisory, independent consultant (sell outcomes), productized service or tool (sell leverage). Write where you want to be in 3 years and the proof each rung requires."},{"id":"p4-cons-2","text":"Independent-consulting economics: day-rate vs value-based pricing, utilization, and the difference between billing a day and selling a fixed-scope audit. Sketch your first three offer-able engagements — e.g. a model-fidelity review, a learning-system V&V / SOTIF credibility audit, a digital-twin or sim-to-real feasibility study."},{"id":"p4-cons-3","text":"Productize one method: turn one repeatable thing you do (a learning-system credibility checklist, a twin-readiness scorecard, a sim-to-real coverage template, a real-time-determinism review) into a reusable asset you could sell, license, or lead with. This is the move from engineer to entrepreneur."},{"id":"p4-cons-4","text":"Find the wedge: pick ONE domain to be known in first (the riches are in the niches), then expand. Write the positioning statement and name the 5 companies or clients who would be your ideal first references."},{"id":"p4-cons-5","text":"Network deliberately: keep engaging substantively with engineers and leaders in your wedge — comment with real insight, share your essays, ask sharp questions. Relationships, not applications, source the highest-value work."}]},{"title":"Highest-Value Roles & Negotiation","items":[{"id":"p4-role-1","text":"Target role ARCHETYPES, not titles: Staff/Principal Controls & GNC Engineer, Adaptive/Learning-Based Controls Engineer, Robot Learning / Physical-AI Engineer, Simulation/HIL Architect, Digital Twin Architect, Embedded Real-Time (C++) Lead, Functional Safety / SOTIF Manager. Map each archetype to which of your 3 builds proves it."},{"id":"p4-role-2","text":"Research compensation bands on Levels.fyi and in recent staff/principal job descriptions. Know the band BEFORE any conversation: staff robotics/controls and digital-twin/GNC roles routinely clear $200K–$400K+ total comp, and frontier Physical-AI / robot-learning roles run far higher with equity. The robot-learning candidate pool is tiny — scarcity is your leverage.","link":"https://www.levels.fyi/"},{"id":"p4-role-3","text":"Interview as a systems thinker: rehearse the prompts that reward exactly what you built — 'model this system on the whiteboard', 'design the V&V for it', 'your twin disagrees with reality, what do you do', 'defend a fidelity/cost tradeoff', 'would you certify this learned controller, and how'."},{"id":"p4-role-4","text":"Prepare 5 STAR stories centered on JUDGMENT: a modeling decision under uncertainty, a validation that overturned a confident result, a safety tradeoff you owned, a time you said 'this model/learned policy cannot answer that', and a successful cross-domain transfer of a method."},{"id":"p4-role-5","text":"Negotiate from leverage: multiple processes in parallel, comp researched, and a portfolio strong enough that you ask 'which problem here is hardest?' rather than 'do I qualify?'. Leverage is manufactured by preparation, not luck."}]},{"title":"Judgment Drills — the automation-proof core","items":[{"id":"p4-jdg-1","text":"Weekly case: given a real system and a question, decide the right model fidelity, the simulation method, and the V&V (or adaptation) plan — in one page. Rotate the domain each week (automotive / robotics / aerospace / manufacturing / IoT) so the judgment generalizes."},{"id":"p4-jdg-2","text":"Red-team your own twin / learned controller: write the STRONGEST case that it should NOT be believed or deployed, then decide what evidence would close each gap. Practiced intellectual honesty is the rarest senior trait and the foundation of trust."},{"id":"p4-jdg-3","text":"Estimate before you compute: Fermi-estimate one key number per system (settling time, bandwidth, required sample rate, twin update latency, inference budget) BY HAND before any tool confirms it. Order-of-magnitude judgment is what clients actually pay for."},{"id":"p4-jdg-4","text":"Translate up: practice explaining one technical tradeoff to a non-engineer decision-maker in 90 seconds, business consequence first. This is the exact skill that turns strong engineers into sought-after consultants and founders."}]},{"title":"Build in Public — Visibility & Proof of Work (the launch)","items":[{"id":"vis-p4-1","text":"Ship the personal site: positioning sentence + the 3 case studies + the 6 flagship essays. This is the home base everything else points to — make it exist before you launch."},{"id":"vis-p4-2","text":"Launch thread: '10 months, first principles to a self-learning airframe.' The arc — paper derivations → V-model → living twin → an adaptive controller you can argue is safe. A coherent narrative of build-in-public posts is worth more than any single viral one."},{"id":"vis-p4-3","text":"Publish the 3 case studies as long-form (each with its credibility argument and validity boundary up front). These are the assets recruiters, clients and collaborators will actually read before a call."},{"id":"vis-p4-4","text":"Submit one conference / meetup talk proposal (ROS-community, a controls or simulation event, or a university guest lecture) and complete one open-source/standards contribution. Public artifacts compound; applications do not."},{"id":"vis-p4-5","text":"Start a sustained weekly judgment-case series in public, rotating across the five domains. It demonstrates range, keeps you visible between job searches, and doubles as your Phase-4 judgment drill."},{"id":"vis-p4-6","text":"Direct outreach: from your 5 named ideal references/teams, start one real conversation — lead with a sharp insight or a relevant artifact, never with 'are you hiring?'. The highest-value roles are sourced through relationships, and you have now earned the right to start them."}]}],"milestones":["Three signature builds published as case studies, each with a credibility argument and a stated validity boundary","Six flagship essays + one talk + one open-source/standards contribution published","Positioning statement and personal site live; wedge domain chosen with five named ideal first references","Consulting value-ladder and three offer-able engagements defined; one method productized into a reusable asset","Can run the systems-thinking interview prompts cold (including 'would you certify this learned controller') and has five judgment-centered STAR stories","Comp bands researched for staff/principal/architect and Physical-AI roles; entered at least 2 processes in parallel","Weekly judgment cases and red-teams are a sustained, public habit rotating across all five industries"]}],"companies":[{"name":"NVIDIA (Isaac / DRIVE / Omniverse)","comp":"$300K–$1.04M","visa":"✓ H-1B","clearance":"None"},{"name":"Waymo / Aurora (AV)","comp":"$300K–$900K+","visa":"✓ H-1B","clearance":"None"},{"name":"Physical Intelligence / Skild (Robot Learning)","comp":"$250K–$600K+","visa":"✓ H-1B","clearance":"None"},{"name":"Anduril (Defense Autonomy)","comp":"$200K–$520K","visa":"✓ H-1B","clearance":"Helpful"},{"name":"Tesla / Rivian (EV + Autonomy)","comp":"$220K–$520K","visa":"✓ H-1B","clearance":"None"},{"name":"Boston Dynamics / Figure (Humanoids)","comp":"$200K–$450K","visa":"✓ H-1B","clearance":"None"},{"name":"SpaceX / Vast (Aerospace GNC)","comp":"$185K–$400K","visa":"Limited","clearance":"Helpful"},{"name":"Joby / Archer (eVTOL)","comp":"$170K–$300K","visa":"✓ H-1B","clearance":"None"},{"name":"Siemens (Digital Twin / Tecnomatix)","comp":"$160K–$300K","visa":"✓ H-1B","clearance":"None"},{"name":"dSPACE / ETAS / Vector (HIL & MBD)","comp":"$150K–$260K","visa":"✓ H-1B","clearance":"None"},{"name":"Bosch / Continental / ZF (Auto Tier-1)","comp":"$150K–$280K","visa":"✓ H-1B","clearance":"None"},{"name":"Independent Consulting (MBD/V&V/DT/Adaptive)","comp":"$1.5K–$3K / day","visa":"n/a","clearance":"Varies"}],"resources":[{"category":"Foundational Books — First Principles, Chapter-Level","color":"#2D7FF9","icon":"📖","items":[{"title":"Nonlinear Dynamics and Chaos (3rd ed.)","author":"Steven Strogatz","priority":"MUST READ","link":"https://www.stevenstrogatz.com/books/nonlinear-dynamics-and-chaos-with-applications-to-physics-biology-chemistry-and-engineering","note":"Ch. 2–9. The geometric language of every dynamical system. Read it to learn to SEE stability, bifurcation and chaos before computing anything. The most transferable book on the list."},{"title":"Feedback Systems (2nd ed., FREE)","author":"Åström & Murray","priority":"MUST READ","link":"https://www.cds.caltech.edu/~murray/books/AM08/pdf/am08-complete_22Feb09.pdf","note":"Ch. 1–12. Control from first principles, Creative-Commons free. The observer in Ch. 7 is the original digital twin AND adaptive controller — internalize that."},{"title":"Nonlinear Systems (3rd ed.)","author":"Hassan Khalil","priority":"MUST READ","link":"https://www.amazon.com/Nonlinear-Systems-3rd-Hassan-Khalil/dp/0130673897","note":"Ch. 4 (Lyapunov), 9 (adaptive). The stability bible. Every safe adaptive or learned controller leans on the Lyapunov argument in this book — do not skip it."},{"title":"Applied Nonlinear Control","author":"Slotine & Li","priority":"MUST READ","link":"https://www.amazon.com/Applied-Nonlinear-Control-Jean-Jacques-Slotine/dp/0130408905","note":"Feedback linearization, sliding-mode, and adaptive control made physical. The clearest on-ramp from linear control into the nonlinear, self-tuning world."},{"title":"Adaptive Control (2nd ed., Dover)","author":"Åström & Wittenmark","priority":"HIGH","link":"https://www.amazon.com/Adaptive-Control-Second-Karl-Astrom/dp/0486462781","note":"MRAC, self-tuning regulators, stability of adaptive laws — by the field's founders. The canonical text for making a fixed-gain controller adapt to a drifting plant."},{"title":"Mathematical Modeling and Simulation","author":"Kai Velten","priority":"MUST READ","link":"https://www.wiley.com/en-us/Mathematical+Modeling+and+Simulation:+Introduction+for+Scientists+and+Engineers,+2nd+Edition-p-9783527839407","note":"Ch. 1–3. The modeling cycle, mechanistic vs phenomenological models. Written by a practicing consultant — exactly the framing you want."},{"title":"The Engineering of Digital Twins","author":"Fitzgerald, Gomes & Larsen (Springer 2024)","priority":"MUST READ","link":"https://link.springer.com/book/10.1007/978-3-031-66719-0","note":"Parts I–IV. The only rigorous first-principles text on digital twins of cyber-physical systems — definitions, models/data, synchronization, decision support, through-life."},{"title":"Data-Driven Science and Engineering (2nd ed., FREE lectures)","author":"Brunton & Kutz","priority":"MUST READ","link":"http://databookuw.com/","note":"Ch. 1 (SVD), 4 (regression/model selection), 7 (DMD/SINDy). Discovering models from data; the exceptional free YouTube lectures alone are worth months."},{"title":"Reinforcement Learning: An Introduction (2nd ed., FREE)","author":"Sutton & Barto","priority":"HIGH","link":"http://incompleteideas.net/book/the-book-2nd.html","note":"The RL canon, free online. Read for the learned-control road in Phase 3 — value, policy, and why a reward is a design decision, not a given."},{"title":"Introduction to Modeling and Simulation: A Systems Approach","author":"Mark Spong","priority":"HIGH","link":"https://www.amazon.com/Introduction-Modeling-Simulation-Systems-Approach/dp/111998288X","note":"Energy methods (Lagrangian/Hamiltonian) and the systems view across electrical, mechanical, aerospace. The bridge from physics to a simulatable model."},{"title":"Probabilistic Robotics (FREE)","author":"Thrun, Burgard & Fox","priority":"HIGH","link":"http://www.probabilistic-robotics.org/","note":"Ch. 2–3. Estimation as 'model corrected by data' — the structure shared by observers, twins and adaptive laws. Derive the Bayes filter and Kalman gain by hand."},{"title":"Aircraft Control and Simulation (3rd ed.)","author":"Stevens, Lewis & Johnson","priority":"HIGH","link":"https://www.amazon.com/Aircraft-Control-Simulation-Dynamics-Autonomous/dp/1118870980","note":"Ch. 1–2. 6-DOF rigid-body modeling and the aero force/moment model — the aerospace half of plant modeling and the GNC-role canon. Build your real airframe's state vector here."},{"title":"Robotics: Modelling, Planning and Control","author":"Siciliano et al.","priority":"HIGH","link":"https://link.springer.com/book/10.1007/978-1-84628-642-1","note":"Ch. 7 (Dynamics). Lagrangian manipulator dynamics — the robotics half of cross-domain plant modeling."},{"title":"System Identification: Theory for the User","author":"Lennart Ljung","priority":"HIGH","link":"https://www.mathworks.com/products/sysid.html","note":"The identification loop, persistent excitation, gray-box vs black-box. How to extract a trustworthy model from data — and the same excitation condition adaptive control depends on."},{"title":"Real-Time C++ (4th ed., code FREE)","author":"Christopher Kormanyos","priority":"HIGH","link":"https://github.com/ckormanyos/real-time-cpp","note":"Deterministic embedded C++: no heap on the hot path, compile-time computation, bounded execution. The language discipline that makes a controller trustworthy on real hardware."},{"title":"A Practical Guide to SysML (3rd ed.)","author":"Friedenthal, Moore & Steiner","priority":"MEDIUM","link":"https://www.omg.org/spec/SysML/","note":"The architect's modeling language: structure, behavior, requirements, parametrics linked into one model. The leadership-level skill."},{"title":"Making Embedded Systems (2nd ed.)","author":"Elecia White","priority":"MEDIUM","link":"https://www.oreilly.com/library/view/making-embedded-systems/9781449308889/","note":"Ch. 1–8. The mental model of how computation meets the physical world. Read for reasoning, not syntax."}]},{"category":"Edge AI, Learning Control & Real-Time Robotics — Platforms","color":"#06B6D4","icon":"🤖","items":[{"title":"NVIDIA Isaac Lab (FREE)","author":"NVIDIA","priority":"HIGH","link":"https://developer.nvidia.com/isaac/lab","note":"GPU-parallel RL training, domain randomization, sim-to-real. Train a control/perception policy here, then deploy to the Jetson — and watch the sim-to-real gap appear as a reconciliation residual."},{"title":"NVIDIA Isaac ROS (FREE)","author":"NVIDIA","priority":"HIGH","link":"https://nvidia-isaac-ros.github.io/","note":"Hardware-accelerated ROS 2 perception packages for Jetson (VSLAM, detection, DNN inference). The accelerated data path behind your edge perception node."},{"title":"NVIDIA TensorRT (FREE)","author":"NVIDIA","priority":"HIGH","link":"https://developer.nvidia.com/tensorrt","note":"The edge-inference optimizer: FP16/INT8 quantization and layer fusion that turn a heavy model into a low-latency one on the Orin Nano. Measure the accuracy/latency tradeoff yourself."},{"title":"PX4 Architecture · NuttX · uORB (FREE)","author":"PX4 Dev Team","priority":"MUST READ","link":"https://docs.px4.io/main/en/concept/architecture.html","note":"The RTOS + shared-memory pub/sub backbone of your real ARKV6X. Read before the hard/soft real-time memo — this is determinism on your actual flight controller."},{"title":"ROS 2 Real-Time (PREEMPT_RT) design (FREE)","author":"ROS 2 / Open Robotics","priority":"HIGH","link":"https://design.ros2.org/articles/realtime_background.html","note":"Why ROS 2 is not deterministic by default and how PREEMPT_RT + QoS get you close. The companion-computer side of your real-time story; micro-ROS bridges to the MCU side."},{"title":"Eclipse iceoryx — zero-copy IPC (FREE)","author":"Eclipse Foundation","priority":"MEDIUM","link":"https://github.com/eclipse-iceoryx/iceoryx","note":"Production-grade lock-free, zero-copy shared-memory transport. The reference for the Brain/Spine handoff between your Jetson and ARKV6X without a deadline-killing mutex."},{"title":"NVIDIA Isaac Sim & Omniverse (FREE)","author":"NVIDIA","priority":"HIGH","link":"https://developer.nvidia.com/isaac/sim","note":"Physically-based robotics/industrial sim, sensor fidelity, virtual commissioning, and HIL with the Jetson running the policy in the loop. The platform behind the Siemens/PepsiCo factory twins."}]},{"category":"Standards, V&V & Open Modeling Tools — Vendor-Neutral","color":"#A855F7","icon":"🛠️","items":[{"title":"Verification and Validation of Simulation Models (FREE paper)","author":"Robert Sargent","priority":"MUST READ","link":"https://www.informs-sim.org/wsc10papers/016.pdf","note":"The Sargent circle: conceptual validity, model verification, operational validity, data validity. The canonical mental model of V&V. Short, free, essential."},{"title":"NASA-STD-7009: Models & Simulations (FREE)","author":"NASA","priority":"MUST READ","link":"https://standards.nasa.gov/standard/NASA/NASA-STD-7009","note":"Credibility Assessment Scale, PIRT, PCMM. The gold standard for arguing a simulation — or a learned system — deserves belief. Build a PIRT for your own model."},{"title":"FMI Standard (FREE)","author":"Modelica Association","priority":"HIGH","link":"https://fmi-standard.org/","note":"The vendor-neutral model-exchange & co-simulation container used by Bosch, Siemens, dSPACE, NI. The backbone of co-simulation and digital twins."},{"title":"OpenModelica (FREE)","author":"Open Source Modelica Consortium","priority":"HIGH","link":"https://openmodelica.org/","note":"Acausal, multi-domain physical modeling — components connected by conservation laws, reusable across studies. Learn acausal modeling here."},{"title":"INTO-CPS / Maestro (FREE)","author":"INTO-CPS Association","priority":"HIGH","link":"https://into-cps.org/","note":"Open co-simulation toolchain for cyber-physical systems — orchestrate multi-FMU twins without vendor lock-in."},{"title":"Simulink & Control System Onramps (FREE)","author":"MathWorks","priority":"HIGH","link":"https://www.mathworks.com/learn/tutorials/simulink-onramp.html","note":"Block-diagram fluency and the MIL→SIL→HIL workflow. The lingua franca of controls teams across automotive and aerospace."},{"title":"STPA Handbook (FREE, MIT)","author":"Nancy Leveson / MIT PSAS","priority":"HIGH","link":"https://psas.scripts.mit.edu/home/","note":"The modern systems-theoretic hazard analysis. Run an STPA and compare it to FMEA — increasingly required in AV, aerospace and learning-system safety roles."},{"title":"INCOSE & NASA Systems Engineering Handbooks","author":"INCOSE / NASA","priority":"HIGH","link":"https://www.incose.org/","note":"Lifecycle, requirements engineering, system-level V&V. The language that lets you architect and lead rather than implement."},{"title":"ISO 26262 / DO-178C / IEC 61508 / SOTIF overviews","author":"ISO / RTCA / IEC","priority":"MEDIUM","link":"https://www.iso.org/standard/68383.html","note":"The shared safety V-model across automotive, aerospace, and the IEC 61508 meta-standard — plus SOTIF (ISO 21448) for ML-based functions. Learn the ASIL/DAL/SIL cross-walk by heart."},{"title":"dSPACE & NI VeriStand HIL (concepts)","author":"dSPACE / NI","priority":"MEDIUM","link":"https://www.dspace.com/en/pub/home/products/systems/hil.cfm","note":"The dominant commercial HIL platforms. Know how the open FMI + PREEMPT_RT-Linux stack maps to them — that mapping is interview gold."}]},{"category":"Your Hardware — Datasheets & Docs","color":"#06B6D4","icon":"🔧","items":[{"title":"ARK Jetson PAB Carrier (companion computer)","author":"ARK Electronics / ArduPilot","priority":"MUST READ","link":"https://ardupilot.org/dev/docs/companion-computer-ark-jetson-pab-carrier.html","note":"The Pixhawk Autopilot Bus + Jetson architecture you're flying. Read this before the two-real-time-domain memo in Phase 1."},{"title":"PX4 EKF2/EKF3 Tuning Guide","author":"PX4 Dev Team","priority":"HIGH","link":"https://docs.px4.io/main/en/advanced_config/tuning_the_ecl_ekf.html","note":"Your flight controller's state estimator — the Phase-1 Bayes filter, running for real. Find the predict/correct step in the source."},{"title":"Schübeler DS-30-AXI HDS 70mm + HET 2W-23 combo specs","author":"Schübeler / TURBINES RC","priority":"HIGH","link":"https://www.turbines-rc.com/en/schubeler/970-ducted-fan-edf-schubeler-ds-30-axi-hds-70mm-het-2w-23.html","note":"Rated ≈2kg thrust / ≈70A at 5S, 22,000–55,000 rpm range. The numbers your actuator-disc thrust derivation should reproduce."},{"title":"simpleRTK2B Heading Kit hookup guide","author":"ArduSimple","priority":"HIGH","link":"https://www.ardusimple.com/simplertk2heading-hookup-guide/","note":"Moving-baseline dual-antenna RTK heading via UBX RELPOSNED — sub-degree heading without a magnetometer. Read before the baseline-vs-accuracy derivation."},{"title":"Holybro Digital Air Speed Sensor (MS4525DO)","author":"Holybro","priority":"HIGH","link":"https://holybro.com/products/digital-air-speed-sensor-ms4525do","note":"Pitot-static differential pressure + temperature, I2C. Derive V = √(2Δp/ρ) and the indicated-vs-true-airspeed correction directly from this datasheet."},{"title":"OAK-D Lite Hardware Docs","author":"Luxonis","priority":"HIGH","link":"https://docs.luxonis.com/hardware/products/OAK-D%20Lite","note":"7.5cm stereo baseline, fixed-focus, no onboard IMU. The numbers behind the depth-uncertainty-vs-range derivation in Phase 1."},{"title":"ExpressLRS Documentation","author":"ExpressLRS Project","priority":"FREE","link":"https://www.expresslrs.org/","note":"The link your RadioMaster Pocket + RP3 run on. Read for latency/failsafe-timeout numbers before modeling the link as a delay in series with your control loop."}]},{"category":"Thought Leadership, Consulting & Roles","color":"#10B981","icon":"🚀","items":[{"title":"Steve Brunton — YouTube (FREE)","author":"Eigensteve","priority":"FREE","link":"https://www.youtube.com/@Eigensteve","note":"Control Bootcamp + Data-Driven series. The best free video intuition for control, dynamics and data-driven modeling anywhere."},{"title":"Digital Twin Consortium","author":"Object Management Group","priority":"READ","link":"https://www.digitaltwinconsortium.org/","note":"The standards body and community for digital twins. Reference frameworks, definitions and the vocabulary clients use."},{"title":"Levels.fyi","author":"levels.fyi","priority":"USE","link":"https://www.levels.fyi/","note":"Research exact staff/principal/architect and Physical-AI comp bands before any negotiation. Know your number before the conversation starts."},{"title":"Kalman & Bayesian Filters in Python (FREE)","author":"Roger Labbe","priority":"FREE","link":"https://github.com/rlabbe/Kalman-and-Bayesian-Filters-in-Python","note":"Interactive companion to Probabilistic Robotics. Let the notebooks compute while you own the intuition behind every plot."}]}]};

<script>
// ============================================================================
// Roadmap Tracker — vanilla JS port of the original React/Supabase app.
//
// Persistence: identical to the original — Supabase (hosted Postgres) stores
// check/uncheck state as a single JSON blob under a fixed row id
// ("my-progress") in a "progress" table with a "checks" jsonb column,
// debounced 600ms after each toggle, using upsert() to save and
// select().eq().single() to load.
//
// Fill in SUPABASE_URL and SUPABASE_ANON_KEY below with your project's
// values (Project Settings → API in the Supabase dashboard). The original
// React app read these from Vite env vars (import.meta.env.VITE_SUPABASE_URL /
// VITE_SUPABASE_ANON_KEY); a static HTML file has no build step to inject
// env vars, so they're plain constants here instead.
// ============================================================================

const SUPABASE_URL = "https://frsaqggqjrbntxfjhjgv.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZyc2FxZ2dxanJibnR4Zmpoamd2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzMjMzMDcsImV4cCI6MjA4ODg5OTMwN30.VPaqyCQ-DrurVAjB5LFQqn15nX36q1pWrdK30UGv7S0";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
const USER_ID = "my-progress";

const PHASES = ROADMAP_DATA.phases;
const COMPANIES = ROADMAP_DATA.companies;
const RESOURCES = ROADMAP_DATA.resources;

// ----------------------------------------------------------------------------
// State (mirrors the React useState/useRef hooks)
// ----------------------------------------------------------------------------
const state = {
  activeTab: "overview",
  checks: {},
  expandedSection: {},
  loaded: false,
  saving: false,
};

// mirrors checksRef / saveTimerRef
let checksRef = {};
let saveTimerRef = undefined;

// ----------------------------------------------------------------------------
// Persistence layer (Supabase — identical logic to the original useEffect/toggleCheck)
// ----------------------------------------------------------------------------
function loadProgress() {
  // Mirrors:
  // supabase.from("progress").select("checks").eq("id", USER_ID).single()
  //   .then(({ data, error }) => { ... })
  supabase
    .from("progress")
    .select("checks")
    .eq("id", USER_ID)
    .single()
    .then(({ data, error }) => {
      if (error && error.code !== "PGRST116") {
        console.error("Load failed:", error);
      }
      if (data && data.checks) {
        state.checks = data.checks;
        checksRef = data.checks;
      }
      state.loaded = true;
      render();
    });
}

function toggleCheck(id) {
  // Mirrors:
  // setChecks(prev => { const next = {...prev,[id]:!prev[id]}; checksRef.current = next; return next; });
  const next = { ...state.checks, [id]: !state.checks[id] };
  state.checks = next;
  checksRef = next;
  render();

  clearTimeout(saveTimerRef);
  state.saving = true;
  renderHeaderSavingIndicator();
  saveTimerRef = setTimeout(() => {
    supabase
      .from("progress")
      .upsert({ id: USER_ID, checks: checksRef })
      .then(({ error }) => {
        if (error) console.error("Save failed:", error);
        state.saving = false;
        renderHeaderSavingIndicator();
      });
  }, 600);
}

function toggleSection(key) {
  const current = state.expandedSection[key];
  state.expandedSection = { ...state.expandedSection, [key]: current === false ? true : false };
  render();
}

function setActiveTab(tab) {
  state.activeTab = tab;
  render();
  window.scrollTo(0, 0);
}

// ----------------------------------------------------------------------------
// Derived data helpers (mirrors phaseItems / phaseProgress / buildProgress / etc.)
// ----------------------------------------------------------------------------
function phaseItems(ph) {
  const items = [];
  ph.sections.forEach(s => s.items.forEach(i => items.push(i)));
  (ph.builds || []).forEach(b => b.modules.forEach(m => m.tasks.forEach(t => items.push(t))));
  return items;
}

function computeProgress(items) {
  const done = items.filter(i => !!state.checks[i.id]).length;
  const total = items.length;
  const pct = total ? Math.round((done / total) * 100) : 0;
  return { done, total, pct };
}

function phaseProgressFor(ph) {
  return computeProgress(phaseItems(ph));
}

function buildProgressFor(b) {
  const all = [];
  b.modules.forEach(m => m.tasks.forEach(t => all.push(t)));
  return computeProgress(all);
}

function allBuilds() {
  const out = [];
  PHASES.forEach((ph, i) => {
    (ph.builds || []).forEach(b => out.push({ build: b, phaseId: ph.id, phaseLabel: ph.label, phaseIdx: i }));
  });
  return out;
}

function overallProgress() {
  const allItems = [];
  PHASES.forEach(p => phaseItems(p).forEach(i => allItems.push(i)));
  const totalDone = allItems.filter(i => !!state.checks[i.id]).length;
  const totalItems = allItems.length;
  const overallPct = totalItems ? Math.round((totalDone / totalItems) * 100) : 0;
  return { totalDone, totalItems, overallPct };
}

const TABS = [
  { id: "overview", label: "Overview" },
  { id: "p1", label: "Phase 1" },
  { id: "p2", label: "Phase 2" },
  { id: "p3", label: "Phase 3" },
  { id: "p4", label: "Phase 4" },
  { id: "resources", label: "Resources" },
];

// ----------------------------------------------------------------------------
// Small render helpers (mirrors Progress / Badge / CheckItem components)
// ----------------------------------------------------------------------------
function esc(str) {
  if (str == null) return "";
  return String(str)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}

function ProgressHtml(value, color, height) {
  const h = height || 8;
  return `<div class="progress-track" style="height:${h}px;">
    <div class="progress-fill" style="width:${Math.min(100, value)}%;background:${color};"></div>
  </div>`;
}

function BadgeHtml(text, color) {
  return `<span class="badge" style="background:${color}22;color:${color};border:1px solid ${color}44;">${esc(text)}</span>`;
}

function CheckItemHtml(item, checked) {
  const linkHtml = item.link
    ? `<a href="${esc(item.link)}" target="_blank" rel="noreferrer" class="check-link" data-stop="1">↗ link</a>`
    : "";
  return `
  <div class="check-row" data-toggle-id="${esc(item.id)}">
    <div class="check-box${checked ? " checked" : ""}" style="border-color:${checked ? "var(--green)" : "var(--border2)"};background:${checked ? "var(--green)" : "transparent"};">
      ${checked ? '<span class="mark">✓</span>' : ""}
    </div>
    <div style="flex:1;">
      <span class="check-text${checked ? " checked" : ""}">${esc(item.text)}</span>
      ${linkHtml}
    </div>
  </div>`;
}

function MilestoneRowHtml(mKey, text, checked, color) {
  return `
  <div class="check-row milestone" data-toggle-id="${esc(mKey)}">
    <div class="check-box milestone${checked ? " checked" : ""}" style="border-color:${checked ? color : "var(--border2)"};background:${checked ? color : "transparent"};">
      ${checked ? '<span class="mark">✓</span>' : ""}
    </div>
    <span class="check-text${checked ? " checked" : ""}" style="font-size:13px;">${esc(text)}</span>
  </div>`;
}

// ----------------------------------------------------------------------------
// Section / module / build renderers
// ----------------------------------------------------------------------------
function renderSection(ph, sec, si) {
  const secKey = `${ph.id}-sec-${si}`;
  const isOpen = state.expandedSection[secKey] === true;
  const secDone = sec.items.filter(i => state.checks[i.id]).length;
  const badgeColor = secDone === sec.items.length ? "var(--green)" : ph.color;

  return `
  <div class="section-card">
    <div class="section-head${isOpen ? " open" : ""}" data-toggle-section="${esc(secKey)}">
      <div class="section-head-left">
        <div class="section-dot" style="background:${ph.color};"></div>
        <span class="section-title">${esc(sec.title)}</span>
        ${BadgeHtml(`${secDone}/${sec.items.length}`, badgeColor)}
      </div>
      <span class="chevron${isOpen ? " open" : ""}">›</span>
    </div>
    ${isOpen ? `<div class="section-body">${sec.items.map(item => CheckItemHtml(item, !!state.checks[item.id])).join("")}</div>` : ""}
  </div>`;
}

function renderModule(b, mod, mi) {
  const modKey = `${b.id}-mod-${mi}`;
  const isOpen = state.expandedSection[modKey] === true;
  const modDone = mod.tasks.filter(t => state.checks[t.id]).length;
  const badgeColor = modDone === mod.tasks.length ? "var(--green)" : b.color;

  return `
  <div class="mod-box">
    <div class="mod-head${isOpen ? " open" : ""}" data-toggle-section="${esc(modKey)}">
      <div class="mod-head-left">
        <div class="mod-num" style="color:${b.color};background:${b.color}22;">M${mi + 1}</div>
        <div>
          <div class="mod-name">${esc(mod.name)}</div>
          <div class="mod-tech">${esc(mod.tech)}</div>
        </div>
      </div>
      <div class="mod-head-right">
        ${BadgeHtml(`${modDone}/${mod.tasks.length}`, badgeColor)}
        <span class="chevron${isOpen ? " open" : ""}">›</span>
      </div>
    </div>
    ${isOpen ? `<div class="mod-body">${mod.tasks.map(t => CheckItemHtml(t, !!state.checks[t.id])).join("")}</div>` : ""}
  </div>`;
}

function renderBuild(b) {
  const prog = buildProgressFor(b);
  return `
  <div class="build-box" style="border:1px solid ${b.color}44;">
    <div class="build-top">
      <div style="flex:1;min-width:240px;">
        <div class="build-label" style="color:${b.color};">★ SIGNATURE BUILD</div>
        <div class="build-title">${esc(b.title)}</div>
        <div class="build-subtitle">${esc(b.subtitle)}</div>
        <div class="build-roles">${b.targetRoles.map(r => BadgeHtml(r, b.color)).join("")}</div>
      </div>
      <div class="build-stat-box">
        <div class="build-stat-pct" style="color:${b.color};">${prog.pct}%</div>
        <div class="build-stat-sub">${prog.done}/${prog.total} tasks</div>
        <div style="margin-top:7px;">${ProgressHtml(prog.pct, b.color, 4)}</div>
      </div>
    </div>
    <div class="build-why" style="background:${b.color}11;border:1px solid ${b.color}33;">
      <div class="build-why-label" style="color:${b.color};">★ WHY THIS BUILD WINS INTERVIEWS</div>
      <div class="build-why-text">${esc(b.why)}</div>
    </div>
    <div class="build-hw">
      <div class="build-hw-label">HARDWARE, TOOLING &amp; PLATFORMS</div>
      <div class="build-hw-tags">${b.hardware.map(h => `<span class="build-hw-tag">${esc(h)}</span>`).join("")}</div>
    </div>
    ${b.modules.map((mod, mi) => renderModule(b, mod, mi)).join("")}
  </div>`;
}

// ----------------------------------------------------------------------------
// Tab content renderers
// ----------------------------------------------------------------------------
function renderOverviewTab() {
  const builds = allBuilds();
  const habitRows = [
    ["120 min", "Read & derive — work the day's chapter with pen and paper; reproduce the key derivation yourself, no solver"],
    ["45 min", "Build or validate — extend a plant model, write deterministic C++, reconcile a twin, or tune an adaptive law"],
    ["30 min", "Judgment case — one fidelity / V&V / adaptation decision written in a page; rotate domain weekly"],
    ["20 min", "Write in public — turn what you learned into a paragraph or a post others can read"],
    ["15 min", "Build log — what you modeled, what surprised you, what you still cannot explain"],
  ];

  return `
  <div>
    <div class="overview-title">From first principles to highly adaptive, self-learning electro-mechanical systems</div>
    <div class="overview-desc">
      One linear path that moves beyond brittle automation toward adaptive, self-learning systems — built on the skills that survive automation: mathematical modeling, deterministic embedded/real-time control, low-latency modern C++, multi-axis and nonlinear/adaptive control theory, digital twins, edge AI, and verification &amp; validation. The major theme — model, simulate, twin, validate — is kept intact and applied across automotive, robotics, aerospace, manufacturing and IoT. Every abstract derivation is re-derived on your real ARK Jetson / ARKV6X / EDF / RTK airframe, and the three signature builds live inside the phases that teach them. The aim throughout: first-principle thinking for the highest-paying, highest-impact engineer, consultant, and founder roles.
    </div>

    <div class="grid-phases">
      ${PHASES.map(ph => {
        const prog = phaseProgressFor(ph);
        return `
        <div class="phase-card" style="border-left:3px solid ${ph.color};" data-goto-tab="${esc(ph.id)}">
          <div class="phase-card-top">
            <div>
              <div class="phase-card-months" style="color:${ph.color};">${esc(ph.months)}</div>
              <div class="phase-card-title">${esc(ph.label)}: ${esc(ph.title)}</div>
            </div>
            <div class="phase-card-pct" style="color:${ph.color};">${prog.pct}%</div>
          </div>
          <div class="phase-card-desc">${esc(ph.desc.slice(0, 100))}…</div>
          ${ProgressHtml(prog.pct, ph.color, 4)}
          <div class="phase-card-sub">${prog.done}/${prog.total} tasks complete</div>
        </div>`;
      }).join("")}
    </div>

    <div class="section-heading-lg">Signature Builds (folded into the phases that teach them)</div>
    <div class="grid-builds">
      ${builds.map(({ build, phaseId, phaseLabel }) => {
        const prog = buildProgressFor(build);

        return `
        <div class="phase-card" style="border-left:3px solid ${build.color};" data-goto-tab="${esc(phaseId)}">
          <div style="font-family:var(--mono);font-size:11px;color:${build.color};font-weight:600;margin-bottom:4px;">SIGNATURE BUILD · ${esc(phaseLabel.toUpperCase())}</div>
          <div style="font-family:var(--display);font-size:15px;font-weight:800;margin-bottom:4px;">${esc(shortTitle)}</div>
          <div style="font-size:12px;color:var(--textDim);margin-bottom:12px;">${esc(build.subtitle)}</div>
          <div style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:12px;">${build.targetRoles.slice(0, 3).map(r => BadgeHtml(r, build.color)).join("")}</div>
          ${ProgressHtml(prog.pct, build.color, 4)}
          <div class="phase-card-sub">${prog.done}/${prog.total} tasks complete</div>
        </div>`;
      }).join("")}
    </div>

    <div class="section-heading-lg">Target employers &amp; markets (senior–principal bands)</div>
    <div class="companies-table">
      <div class="companies-head-row">
        ${["Employer / Market", "Senior–Principal Comp", "Visa", "Clearance"].map(h => `<div class="companies-head-cell">${esc(h)}</div>`).join("")}
      </div>
      ${COMPANIES.map((c, i) => `
        <div class="companies-row${i % 2 === 0 ? "" : " odd"}">
          <div class="companies-cell c-name">${esc(c.name)}</div>
          <div class="companies-cell c-comp">${esc(c.comp)}</div>
          <div class="companies-cell c-visa">${esc(c.visa)}</div>
          <div class="companies-cell c-clear">${esc(c.clearance)}</div>
        </div>`).join("")}
    </div>

    <div class="habit-box" style="background:var(--blue)11;border:1px solid var(--blue)33;">
      <div class="habit-heading">Daily Habit Stack (Non-Negotiable)</div>
      <div class="grid-habits">
        ${habitRows.map(([time, desc]) => `
          <div class="habit-card">
            <div class="habit-time">${esc(time)}</div>
            <div class="habit-desc">${esc(desc)}</div>
          </div>`).join("")}
      </div>
    </div>
  </div>`;
}

function renderPhaseTab(ph) {
  const prog = phaseProgressFor(ph);
  return `
  <div>
    <div class="phase-header">
      <div>
        <div class="phase-months" style="color:${ph.color};">${esc(ph.months)}</div>
        <div class="phase-title">${esc(ph.label)}: ${esc(ph.title)}</div>
        <div class="phase-desc">${esc(ph.desc)}</div>
      </div>
      <div class="phase-stat-box">
        <div class="phase-stat-pct" style="color:${ph.color};">${prog.pct}%</div>
        <div class="phase-stat-sub">${prog.done}/${prog.total} tasks</div>
        <div style="margin-top:8px;">${ProgressHtml(prog.pct, ph.color, 4)}</div>
      </div>
    </div>

    ${ph.sections.map((sec, si) => renderSection(ph, sec, si)).join("")}
    ${(ph.builds || []).map(b => renderBuild(b)).join("")}

    <div class="milestone-box" style="background:${ph.color}11;border:1px solid ${ph.color}33;">
      <div class="milestone-title" style="color:${ph.color};">${esc(ph.label)} Milestone Checklist</div>
      ${ph.milestones.map((m, mi) => {
        const mKey = `${ph.id}-milestone-${mi}`;
        return MilestoneRowHtml(mKey, m, !!state.checks[mKey], ph.color);
      }).join("")}
    </div>
  </div>`;
}

function renderResourcesTab() {
  return `
  <div>
    <div class="resources-heading">Learning Resources</div>
    <div class="resources-sub">Curated for first-principles depth and judgment. Books include chapter-level guidance — read to understand, not to memorize.</div>
    ${RESOURCES.map(cat => `
      <div class="res-cat-block">
        <div class="res-cat-head">
          <span class="res-cat-icon">${esc(cat.icon)}</span>
          <div class="res-cat-title">${esc(cat.category)}</div>
          <div class="res-cat-line"></div>
        </div>
        <div class="grid-resources">
          ${cat.items.map(item => {
            const isFree = item.priority === "FREE" || item.priority === "FREE TRIAL";
            const isMust = item.priority === "MUST READ" || item.priority === "MUST" || item.priority === "MUST DO";
            const badgeColor = isFree ? "var(--green)" : isMust ? "var(--red)" : cat.color;
            return `
            <a href="${esc(item.link)}" target="_blank" rel="noreferrer" class="resource-card">
              <div class="res-card-top">
                <div class="res-card-title">${esc(item.title)}</div>
                ${BadgeHtml(item.priority, badgeColor)}
              </div>
              <div class="res-card-author">${esc(item.author)}</div>
              <div class="res-card-note">${esc(item.note)}</div>
              <div class="res-card-link" style="color:${cat.color};">↗ Open resource</div>
            </a>`;
          }).join("")}
        </div>
      </div>
    `).join("")}
  </div>`;
}

// ----------------------------------------------------------------------------
// Top-level render
// ----------------------------------------------------------------------------
function renderHeaderSavingIndicator() {
  const el = document.getElementById("saving-indicator");
  if (el) el.style.display = state.saving ? "inline" : "none";
}

function render() {
  const app = document.getElementById("app");

  if (!state.loaded) {
    app.innerHTML = `<div class="loading-screen">Loading roadmap…</div>`;
    return;
  }

  const { totalDone, totalItems, overallPct } = overallProgress();

  let tabContent = "";
  if (state.activeTab === "overview") {
    tabContent = renderOverviewTab();
  } else if (state.activeTab === "resources") {
    tabContent = renderResourcesTab();
  } else {
    const ph = PHASES.find(p => p.id === state.activeTab);
    if (ph) tabContent = renderPhaseTab(ph);
  }

  app.innerHTML = `
    <div class="header-bar">
      <div class="container">
        <div class="header-row">
          <div>
            <div class="header-title">EDGE AI · DETERMINISTIC ROBOTICS · ADAPTIVE CONTROL — MASTERY PATH</div>
            <div class="header-sub">
              10-MONTH FIRST-PRINCIPLES ROADMAP · MODELING → SIMULATION → DIGITAL TWINS → V&amp;V → SELF-LEARNING SYSTEMS · ENGINEER · CONSULTANT · FOUNDER
              <span id="saving-indicator" class="saving-indicator" style="display:${state.saving ? "inline" : "none"};"> · saving…</span>
            </div>
          </div>
          <div class="overall-wrap">
            <div>
              <div class="overall-label">OVERALL — ${totalDone}/${totalItems} tasks</div>
              ${ProgressHtml(overallPct, "var(--blue)", 5)}
            </div>
            <div class="overall-pct">${overallPct}%</div>
          </div>
        </div>
        <div class="tabs-row">
          ${TABS.map(t => `<button class="tab-btn${state.activeTab === t.id ? " active" : ""}" data-goto-tab="${esc(t.id)}">${esc(t.label)}</button>`).join("")}
        </div>
      </div>
    </div>
    <div class="content-wrap fade-in">${tabContent}</div>
  `;
}

// ----------------------------------------------------------------------------
// Event delegation (clicks on checkboxes, section headers, tabs)
// ----------------------------------------------------------------------------
document.addEventListener("click", (e) => {
  const link = e.target.closest("[data-stop]");
  if (link) {
    e.stopPropagation();
    return; // let the link's own navigation happen, just don't bubble to the check-row
  }

  const toggleId = e.target.closest("[data-toggle-id]");
  if (toggleId) {
    toggleCheck(toggleId.getAttribute("data-toggle-id"));
    return;
  }

  const toggleSec = e.target.closest("[data-toggle-section]");
  if (toggleSec) {
    toggleSection(toggleSec.getAttribute("data-toggle-section"));
    return;
  }

  const gotoTab = e.target.closest("[data-goto-tab]");
  if (gotoTab) {
    setActiveTab(gotoTab.getAttribute("data-goto-tab"));
    return;
  }
});

// ----------------------------------------------------------------------------
// Init
// ----------------------------------------------------------------------------
render(); // show loading screen
loadProgress(); // then load persisted state and render the real UI

</script>
</body>
</html>
