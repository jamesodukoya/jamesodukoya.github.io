<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edge AI · Deterministic Robotics · Adaptive Control — Mastery Path</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Syne:wght@700;800&display=swap');

:root {
  --bg: #070B14;
  --surface: #0D1525;
  --surface2: #111B30;
  --border: #1A2D4A;
  --border2: #243C60;
  --blue: #2D7FF9;
  --blueLight: #60A5FA;
  --amber: #F59E0B;
  --green: #10B981;
  --greenDim: #064E3B;
  --red: #EF4444;
  --purple: #A855F7;
  --cyan: #06B6D4;
  --text: #E2E8F0;
  --textDim: #7B95B8;
  --textMuted: #4A6FA8;
  --mono: 'JetBrains Mono', monospace;
  --sans: 'Space Grotesk', sans-serif;
  --display: 'Syne', sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body { background: var(--bg); }

body {
  font-family: var(--sans);
  color: var(--text);
  min-height: 100vh;
}

::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--surface); }
::-webkit-scrollbar-thumb { background: #1E3A5F; border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--blue); }

a { color: var(--blueLight); text-decoration: none; }
a:hover { color: #93C5FD; text-decoration: underline; }

@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.fade-in { animation: fadeIn 0.3s ease both; }

.tab-btn:hover { background: rgba(45,127,249,0.12) !important; }
.check-row:hover { background: rgba(45,127,249,0.06) !important; }
.resource-card:hover { border-color: rgba(45,127,249,0.5) !important; transform: translateY(-2px); background: rgba(13,29,54,0.9) !important; }
.resource-card { transition: all 0.2s ease; }
.phase-card:hover { border-color: rgba(45,127,249,0.4) !important; }

.container { max-width: 1100px; margin: 0 auto; padding: 0 20px; }
.content-wrap { max-width: 1100px; margin: 0 auto; padding: 28px 20px 60px; }

.header-bar { background: var(--surface); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
.header-row { display: flex; align-items: center; justify-content: space-between; padding-top: 14px; padding-bottom: 10px; gap: 16px; flex-wrap: wrap; }
.header-title { font-family: var(--display); font-size: 17px; font-weight: 800; color: var(--text); letter-spacing: -0.02em; }
.header-sub { font-family: var(--mono); font-size: 11px; color: var(--textMuted); margin-top: 2px; }
.saving-indicator { color: var(--amber); }

.overall-wrap { display: flex; align-items: center; gap: 12px; }
.overall-label { font-family: var(--mono); font-size: 11px; color: var(--textDim); margin-bottom: 4px; text-align: right; }
.overall-pct { font-family: var(--display); font-size: 22px; font-weight: 800; color: var(--blue); min-width: 46px; text-align: right; }

.tabs-row { display: flex; gap: 2px; overflow-x: auto; padding-bottom: 1px; }
.tab-btn {
  background: transparent; border: none; border-bottom: 2px solid transparent;
  color: var(--textMuted); font-family: var(--mono); font-weight: 600;
  font-size: 11px; letter-spacing: 0.06em; padding: 8px 14px; cursor: pointer;
  white-space: nowrap; transition: all 0.15s; border-radius: 4px 4px 0 0;
}
.tab-btn.active { background: rgba(45,127,249,0.13); border-bottom-color: var(--blue); color: var(--blue); }

.progress-track { background: var(--border); border-radius: 99px; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 99px; transition: width 0.5s ease; }

.badge {
  border-radius: 4px; padding: 1px 7px; font-size: 11px; font-family: var(--mono);
  font-weight: 600; letter-spacing: 0.05em; display: inline-block;
}

.check-row {
  display: flex; align-items: flex-start; gap: 10px; padding: 8px 10px;
  border-radius: 6px; cursor: pointer; transition: background 0.15s; margin-bottom: 2px;
}
.check-row.milestone { padding: 7px 8px; }
.check-box {
  flex-shrink: 0; width: 18px; height: 18px; border-radius: 4px; border: 1.5px solid var(--border2);
  background: transparent; display: flex; align-items: center; justify-content: center;
  margin-top: 1px; transition: all 0.2s;
}
.check-box.milestone { border-radius: 9px; }
.check-box.checked { color: #fff; }
.check-box .mark { color: #fff; font-size: 11px; line-height: 1; }
.check-text { font-size: 13px; line-height: 1.5; transition: all 0.2s; }
.check-text.checked { color: var(--textMuted); text-decoration: line-through; }
.check-text:not(.checked) { color: var(--text); }
.check-link { display: inline-flex; align-items: center; gap: 3px; margin-left: 6px; font-size: 11px; color: var(--blueLight); font-family: var(--mono); }

.section-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; margin-bottom: 10px; overflow: hidden; }
.section-head { display: flex; align-items: center; justify-content: space-between; padding: 13px 16px; cursor: pointer; background: transparent; }
.section-head.open { background: var(--surface2); }
.section-head-left { display: flex; align-items: center; gap: 10px; }
.section-dot { width: 6px; height: 6px; border-radius: 2px; flex-shrink: 0; }
.section-title { font-weight: 600; font-size: 14px; }
.chevron { color: var(--textMuted); font-size: 16px; transition: transform 0.2s; transform: rotate(0); display: inline-block; }
.chevron.open { transform: rotate(90deg); }
.section-body { padding: 6px 8px 8px; }

.phase-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 20px; gap: 16px; flex-wrap: wrap; }
.phase-months { font-family: var(--mono); font-size: 11px; font-weight: 600; margin-bottom: 4px; }
.phase-title { font-family: var(--display); font-size: 26px; font-weight: 800; letter-spacing: -0.02em; margin-bottom: 6px; }
.phase-desc { color: var(--textDim); font-size: 13px; max-width: 660px; line-height: 1.6; }
.phase-stat-box { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px 20px; text-align: center; min-width: 120px; }
.phase-stat-pct { font-family: var(--display); font-size: 30px; font-weight: 800; }
.phase-stat-sub { font-family: var(--mono); font-size: 11px; color: var(--textMuted); }

.milestone-box { border-radius: 10px; padding: 18px; margin-top: 16px; }
.milestone-title { font-family: var(--display); font-size: 14px; font-weight: 800; margin-bottom: 12px; }

.build-box { background: var(--surface2); border-radius: 12px; padding: 18px 16px; margin-top: 18px; }
.build-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 14px; flex-wrap: wrap; margin-bottom: 12px; }
.build-label { font-family: var(--mono); font-size: 11px; font-weight: 700; margin-bottom: 5px; letter-spacing: 0.06em; }
.build-title { font-family: var(--display); font-size: 19px; font-weight: 800; letter-spacing: -0.01em; margin-bottom: 4px; }
.build-subtitle { color: var(--textDim); font-size: 13px; line-height: 1.55; margin-bottom: 10px; }
.build-roles { display: flex; flex-wrap: wrap; gap: 6px; }
.build-stat-box { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 12px 18px; text-align: center; min-width: 110px; }
.build-stat-pct { font-family: var(--display); font-size: 24px; font-weight: 800; }
.build-stat-sub { font-family: var(--mono); font-size: 11px; color: var(--textMuted); }
.build-why { border-radius: 10px; padding: 16px; margin-bottom: 14px; }
.build-why-label { font-family: var(--mono); font-size: 11px; font-weight: 600; margin-bottom: 6px; }
.build-why-text { font-size: 13px; color: var(--textDim); line-height: 1.6; }
.build-hw { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 16px; margin-bottom: 14px; }
.build-hw-label { font-family: var(--mono); font-size: 11px; color: var(--textMuted); font-weight: 600; margin-bottom: 10px; }
.build-hw-tags { display: flex; flex-wrap: wrap; gap: 6px; }
.build-hw-tag { background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 4px 10px; font-size: 11px; color: var(--textDim); font-family: var(--mono); }

.mod-box { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; margin-bottom: 8px; overflow: hidden; }
.mod-head { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; cursor: pointer; background: transparent; }
.mod-head.open { background: var(--surface2); }
.mod-head-left { display: flex; align-items: flex-start; gap: 10px; flex: 1; }
.mod-num { font-family: var(--mono); font-size: 11px; font-weight: 700; padding: 2px 7px; border-radius: 4px; flex-shrink: 0; }
.mod-name { font-weight: 600; font-size: 13px; margin-bottom: 2px; }
.mod-tech { font-family: var(--mono); font-size: 11px; color: var(--textMuted); }
.mod-head-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
.mod-body { padding: 6px 8px 8px; }

.phase-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 18px; cursor: pointer; transition: border-color 0.2s; }
.phase-card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
.phase-card-months { font-family: var(--mono); font-size: 11px; font-weight: 600; margin-bottom: 3px; }
.phase-card-title { font-family: var(--display); font-size: 16px; font-weight: 800; color: var(--text); }
.phase-card-pct { font-family: var(--display); font-size: 20px; font-weight: 800; }
.phase-card-desc { font-size: 12px; color: var(--textDim); margin-bottom: 12px; line-height: 1.5; }
.phase-card-sub { font-family: var(--mono); font-size: 11px; color: var(--textMuted); margin-top: 6px; }

.grid-phases { display: grid; grid-template-columns: repeat(auto-fit, minmax(230px, 1fr)); gap: 14px; margin-bottom: 28px; }
.grid-builds { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 14px; margin-bottom: 28px; }
.grid-resources { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 10px; }
.grid-habits { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 8px; }

.section-heading-lg { font-family: var(--display); font-size: 18px; font-weight: 800; margin-bottom: 14px; letter-spacing: -0.01em; }
.overview-title { font-family: var(--display); font-size: 28px; font-weight: 800; margin-bottom: 6px; letter-spacing: -0.02em; }
.overview-desc { color: var(--textDim); font-size: 14px; margin-bottom: 28px; max-width: 700px; line-height: 1.6; }

.companies-table { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; margin-bottom: 28px; }
.companies-head-row { display: grid; grid-template-columns: 2fr 2fr 1fr 1fr; background: var(--surface2); border-bottom: 1px solid var(--border); }
.companies-head-cell { padding: 9px 16px; font-family: var(--mono); font-size: 11px; font-weight: 600; color: var(--textMuted); letter-spacing: 0.08em; }
.companies-row { display: grid; grid-template-columns: 2fr 2fr 1fr 1fr; border-bottom: 1px solid var(--border); }
.companies-row:last-child { border-bottom: none; }
.companies-row.odd { background: rgba(17,27,48,0.33); }
.companies-cell { padding: 10px 16px; }
.c-name { font-weight: 600; font-size: 13px; }
.c-comp { font-family: var(--mono); font-size: 12px; color: var(--amber); }
.c-visa { font-family: var(--mono); font-size: 12px; color: var(--green); }
.c-clear { font-family: var(--mono); font-size: 11px; color: var(--textDim); }

.habit-box { border-radius: 10px; padding: 20px; }
.habit-heading { font-family: var(--display); font-size: 15px; font-weight: 800; color: var(--blue); margin-bottom: 12px; }
.habit-card { background: var(--surface); border-radius: 8px; padding: 10px 12px; }
.habit-time { font-family: var(--mono); font-size: 12px; color: var(--blue); font-weight: 600; margin-bottom: 3px; }
.habit-desc { font-size: 12px; color: var(--textDim); line-height: 1.5; }

.resources-heading { font-family: var(--display); font-size: 26px; font-weight: 800; letter-spacing: -0.02em; margin-bottom: 6px; }
.resources-sub { color: var(--textDim); font-size: 13px; margin-bottom: 24px; }
.res-cat-head { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
.res-cat-icon { font-size: 18px; }
.res-cat-title { font-family: var(--display); font-size: 18px; font-weight: 800; letter-spacing: -0.01em; }
.res-cat-line { flex: 1; height: 1px; background: var(--border); margin-left: 4px; }
.res-cat-block { margin-bottom: 28px; }
.resource-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; display: block; text-decoration: none; }
.res-card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 6px; }
.res-card-title { font-weight: 600; font-size: 13px; color: var(--text); line-height: 1.4; }
.res-card-author { font-family: var(--mono); font-size: 11px; color: var(--textMuted); margin-bottom: 6px; }
.res-card-note { font-size: 12px; color: var(--textDim); line-height: 1.5; }
.res-card-link { font-family: var(--mono); font-size: 11px; margin-top: 8px; }

.loading-screen { min-height: 100vh; background: var(--bg); display: flex; align-items: center; justify-content: center; font-family: var(--mono); color: var(--blue); font-size: 14px; }
</style>

<script>
const ROADMAP_DATA = {"phases":[{"id":"p1","label":"Phase 1","title":"First Principles & the Real-Time Substrate","months":"Months 1–2","color":"#2D7FF9","icon":"⬡","desc":"Before tools, the language. Master the mathematics every adaptive, self-learning electro-mechanical system is secretly written in: dynamical systems, feedback and control taken all the way to nonlinear stability (the gateway to adaptive control), the discipline of mathematical modeling, the embedded/real-time substrate that makes control deterministic, modern C++ as the low-latency execution layer, and estimation under uncertainty. Almost every derivation is taught against — and then re-derived on — your real ARK Jetson Orin Nano + ARKV6X EDF airframe, so the abstractions land in your actual amps, antenna spacing, and loop periods. You finish able to look at any physical system, write down its model, reason about its stability, and say what feedback — and adaptation — will do to it.","sections":[{"title":"Dynamical Systems & Geometric Intuition — Strogatz, Nonlinear Dynamics & Chaos (Ch. 2–9)","items":[{"id":"p1-dyn-1","text":"Strogatz Ch. 2 — Flows on the Line: fixed points, linear stability analysis, the geometric way of thinking. Do every exercise by hand AND by phase-line sketch. The goal is to SEE stability, not compute it. This is the single most transferable skill in the roadmap.","link":"https://www.stevenstrogatz.com/books/nonlinear-dynamics-and-chaos-with-applications-to-physics-biology-chemistry-and-engineering"},{"id":"p1-dyn-2","text":"Strogatz Ch. 3 — Bifurcations (saddle-node, transcritical, pitchfork). For each, name a real engineering system that exhibits it (column buckling, motor stall, latch-up, snap-through). Write one paragraph per bifurcation tying the mathematics to the physical failure mode."},{"id":"p1-dyn-3","text":"Strogatz Ch. 5–6 — Linear systems & the phase plane: classify 2D fixed points (nodes, saddles, spirals, centers), nullclines, trajectories. Hand-sketch the phase portrait of a damped pendulum and a predator-prey system BEFORE touching any solver, then check yourself."},{"id":"p1-dyn-4","text":"Strogatz Ch. 7–8 — Limit cycles & their bifurcations: Hopf bifurcation, relaxation oscillations, Poincaré–Bendixson. Connect Hopf to real oscillation onset (wing flutter, brake squeal, grid instability) — explain why a stable system suddenly starts to oscillate."},{"id":"p1-dyn-5","text":"Strogatz Ch. 9 — Lorenz equations & chaos: sensitive dependence, strange attractors, the fundamental limit on long-horizon prediction. Write a one-page note: what chaos means for digital-twin prediction horizons. (Judgment, not computation.)"},{"id":"p1-dyn-6","text":"Derivation drill (no code): from three physical systems — a quarter-car suspension, a DC motor, a stirred heated tank — write the governing ODEs from first principles (Newton / Kirchhoff / energy balance), identify states and inputs, and nondimensionalize one of them. Paper and physics only."}]},{"title":"Feedback & Control From First Principles — Åström & Murray, Feedback Systems (FREE, Ch. 1–12)","items":[{"id":"p1-ctrl-1","text":"Åström & Murray Ch. 1–2 — Introduction & System Modeling: state-space modeling of physical, biological and information systems; why feedback is the central idea of all engineering. Free Creative-Commons PDF.","link":"https://www.cds.caltech.edu/~murray/books/AM08/pdf/am08-complete_22Feb09.pdf"},{"id":"p1-ctrl-2","text":"A&M Ch. 3–4 — Examples & Dynamic Behavior: equilibria, stability, Lyapunov functions (the energy argument for stability). Prove the stability of one nonlinear system using a Lyapunov function entirely by hand."},{"id":"p1-ctrl-3","text":"A&M Ch. 5–6 — Linear Systems & State Feedback: the matrix exponential, reachability, eigenvalue placement. Hand-place the poles of a 2-state system and explain physically what each closed-loop pole does to the response."},{"id":"p1-ctrl-4","text":"A&M Ch. 7 — Output Feedback & Observers: the separation principle; the observer as a MODEL running in parallel with reality, corrected by measurement. Note this explicitly — it is the seed of every digital twin AND every adaptive controller you will build later."},{"id":"p1-ctrl-5","text":"A&M Ch. 8–9 — Transfer Functions & Frequency Domain: Bode, Nyquist, gain margin and phase margin as the language of robustness. Read a real plant frequency response and state its stability margins out loud."},{"id":"p1-ctrl-6","text":"A&M Ch. 10–12 — PID & Robust Performance: why PID dominates industry, integral windup, and the fundamental limitations (waterbed effect, Bode sensitivity integral). Write the half-page argument for why you cannot have arbitrarily good control — this is senior-level intuition."},{"id":"p1-ctrl-7","text":"Watch Steve Brunton's Control Bootcamp series alongside the reading — the same material with geometric animation. Free, and the fastest way to build intuition.","link":"https://www.youtube.com/@Eigensteve"}]},{"title":"Nonlinear Stability & the Road to Adaptive Control — Khalil + Slotine & Li (the frontier prerequisite)","items":[{"id":"p1-nl-1","text":"Khalil, Nonlinear Systems, Ch. 4 — Lyapunov stability done properly: the direct method, LaSalle's invariance principle, region of attraction. Prove asymptotic stability of ONE mechanical system by hand (e.g. your EDF pitch dynamics about trim). This single tool is what every adaptive and learning-based controller leans on to PROVE it will not destabilize your hardware — without it, 'self-learning control' is just hope.","link":"https://www.amazon.com/Nonlinear-Systems-3rd-Hassan-Khalil/dp/0130673897"},{"id":"p1-nl-2","text":"Slotine & Li, Applied Nonlinear Control, Ch. 3–4 & 7 — feedback linearization and sliding-mode control: why a nonlinear plant (your servo + EDF + airframe) is not honestly controlled by a single fixed linear gain set. Derive a sliding surface for one real loop and state the chattering tradeoff in plain words.","link":"https://www.amazon.com/Applied-Nonlinear-Control-Jean-Jacques-Slotine/dp/0130408905"},{"id":"p1-nl-3","text":"The adaptation motivation (Slotine & Li Ch. 8 / Åström & Wittenmark Ch. 1): write one page on why a controller tuned at ONE operating point degrades as the plant drifts, then name the exact parameters of YOUR airframe that drift in flight — battery voltage sag, CG shift as the pack discharges, prop/EDF wear, air-density change with altitude. This list is the concrete motivation for everything adaptive in Phase 3."},{"id":"p1-nl-4","text":"The barrier to naive adaptation: read why an adaptive law can itself go unstable (parameter drift, bursting, lack of excitation). State the single condition — persistent excitation — that links adaptive control to system identification, which you will formalize in Phase 2. Understanding the failure modes is what separates an engineer who deploys adaptation from one who fears it."}]},{"title":"The Discipline of Mathematical Modeling — Velten + Spong","items":[{"id":"p1-mod-1","text":"Velten, Mathematical Modeling and Simulation, Ch. 1 — Principles: the (System, Question, Model) triplet, mechanistic vs phenomenological models, the modeling cycle. Internalize why 'all models are wrong, some are useful' is an engineering tool, not a platitude.","link":"https://www.wiley.com/en-us/Mathematical+Modeling+and+Simulation:+Introduction+for+Scientists+and+Engineers,+2nd+Edition-p-9783527839407"},{"id":"p1-mod-2","text":"Velten Ch. 2–3 — Phenomenological (data-based) vs mechanistic (ODE) models: when each is appropriate, parameter estimation as an inverse problem. Pick ONE system; build both a data-driven and a physics-based model of it; compare what each can and cannot tell you. (This is the same tension as model-based vs learned control.)"},{"id":"p1-mod-3","text":"Spong, Introduction to Modeling and Simulation: A Systems Approach — energy methods (Lagrangian/Hamiltonian): derive the equations of motion of a 2-DOF system via energy rather than force balance. This technique scales to robots and vehicles where force balance becomes intractable.","link":"https://www.amazon.com/Introduction-Modeling-Simulation-Systems-Approach/dp/111998288X"},{"id":"p1-mod-4","text":"Model-fidelity ladder (the core consulting skill): write a one-page decision memo for a single system (e.g. your airframe) listing 4 fidelities — point mass, rigid body, flexible body, multibody-with-aero — and state exactly which engineering question each fidelity answers and what it cannot. This is judgment, and it does not automate."},{"id":"p1-mod-5","text":"Dimensional analysis & scaling: use the Buckingham π theorem to reduce a real problem (the EDF rotor or a heat exchanger) to dimensionless groups. Explain what scaling buys you in simulation cost and in transferability of results across sizes."}]},{"title":"The Real Plant — Propulsion, Power & Actuation (derive your airframe's dynamics)","items":[{"id":"hw-prop-1","text":"Derive a thrust model for the Schübeler DS-30-AXI ducted fan from actuator-disc (momentum) theory: F = ṁ·Δv, with ṁ from disc area, air density and induced velocity. Predict static thrust across the rated speed range and compare it to the manufacturer's combo rating (≈2kg static thrust at ≈70A on 5S). State your prediction error and the single biggest modeling assumption causing it (duct losses, blade-tip clearance, non-uniform inflow).","link":"https://www.turbines-rc.com/en/schubeler/970-ducted-fan-edf-schubeler-ds-30-axi-hds-70mm-het-2w-23.html"},{"id":"hw-prop-2","text":"Build the HET 2W-23 motor's electrical model from its KV rating: derive the torque constant KT = 1/(KV·2π/60), write the steady-state circuit equation V = I·R + KT·ω, and use one known (voltage, current, thrust→torque) operating point to back out the winding resistance R. You now have a real, numbered electrical plant, not a textbook placeholder."},{"id":"hw-prop-3","text":"Re-derive the Graupner ESC's '20% over rated' sizing rule from an I²R thermal argument instead of taking it on faith: estimate the FET conduction loss at 70A continuous, the duty-cycle/commutation losses of six-step trapezoidal switching, and show why a 100A-rated controller is the right (not just conventional) choice for this combo."},{"id":"hw-prop-4","text":"Combine the motor electrical dynamics with the EDF's aerodynamic load (drag torque scaling with ω²) into a single propulsion ODE. Linearize about your cruise throttle and report the closed-loop time constant and bandwidth of thrust response to a throttle step — this becomes the actuator-dynamics block inside Signature Build 1's plant model AND the drifting plant your adaptive law targets in Phase 3."},{"id":"hw-prop-5","text":"Build a Thevenin equivalent-circuit model (OCV + internal resistance, optionally one RC pair) for the CNHL 5200mAh 18.5V 5S 90C pack. Predict voltage sag at 70A draw. Explain why a 90C rating (5.2Ah×90 = 468A) being far above your 70A draw does NOT mean zero internal resistance — the headroom is a thermal/safety margin, not a modeling shortcut. Note that this sag is one of the plant parameters that drifts in flight (Phase 3 adaptive control)."},{"id":"hw-prop-6","text":"Draw the EFT power-distribution-board as a current-budget graph: battery → PDB → {ESC, servo, Jetson, ARKV6X, peripherals}. Size every branch, identify the single point of failure, and state the precise fail-safe consequence if the PDB sags at the exact moment EDF peak current and Jetson vision-inference current coincide."},{"id":"hw-act-1","text":"Model the 55kg all-metal brushless servo as a second-order system with a rate limit and a deadband (its torque-speed curve trades stall torque against no-load slew rate). Derive its effective small-signal bandwidth and compare it against the bandwidth your outer attitude loop actually demands — the same Bode/margin reasoning from the control reading, applied to a part you can hold in your hand."},{"id":"hw-act-2","text":"Recognize the servo as a small closed loop nested inside your larger one: the PWM command it receives is a position SETPOINT for its own internal PID, not a direct torque or angle command. Write one paragraph on why this nesting matters for the gain margin of your outer loop — the recursive-control insight most builders never make explicit."},{"id":"hw-act-3","text":"From the all-metal-gear construction, reason about static friction and backlash: estimate the deadband this introduces and the smallest commandable surface deflection it implies. Tie this explicitly to the quantization / sensor-actuator-as-model lesson — your actuator has a measurement-model-shaped imperfection of its own, and it is exactly the kind of nonlinearity a learned controller can exploit or be fooled by."},{"id":"hw-act-4","text":"Decide, by calculation and not by rule of thumb, whether 55kg·cm is correctly sized: estimate the aerodynamic hinge moment on whatever it actuates (control surface or thrust-vectoring vane) at your expected dynamic pressure (½ρV²) and moment arm, and compare it to stall torque with an explicit safety factor you choose and justify."}]},{"title":"Sensors as Models — the real perception stack","items":[{"id":"p1-emb-4","text":"Sensors & actuators AS MODELS: for an IMU, a LiDAR, and an encoder, write the measurement model — deterministic map + noise + bias + latency + quantization. This object is what you inject into every SIL/HIL test, every digital twin, AND every learned perception node later. Modeling, not coding. Then do it for your REAL parts in the items below — they are not hypothetical."},{"id":"hw-perc-1","text":"Derive the stereo depth equation from the OAK-D Lite's fixed 7.5cm baseline: depth = f·baseline / disparity. Compute how depth uncertainty grows with range for this exact baseline, and state the range beyond which the camera is no longer a trustworthy depth source. Note the Lite carries no onboard IMU — visual-inertial fusion must borrow IMU data from the ARKV6X, itself an architecture decision worth defending in writing.","link":"https://docs.luxonis.com/hardware/products/OAK-D%20Lite"},{"id":"hw-perc-3","text":"Derive RTK heading from first principles: the simpleRTK2B Heading Kit computes heading from the VECTOR between two GNSS antennas via moving-baseline RTK (UBX RELPOSNED), not a magnetometer. Derive heading-error ≈ position-error / baseline-length, and check your physical antenna spacing against the kit's sub-degree out-of-the-box claim — is your spacing wide enough to actually deliver it?","link":"https://www.ardusimple.com/simplertk2heading-hookup-guide/"},{"id":"hw-perc-4","text":"Derive airspeed from Bernoulli's equation: V = √(2·Δp/ρ) from the Holybro differential-pressure reading. Then build the FULL measurement model — bias, pitot-position error, and the indicated-vs-true-airspeed correction the sensor enables via its onboard temperature and the flight controller's static pressure. This is the 'sensors as models' exercise done on the actual part, not a generic placeholder.","link":"https://holybro.com/products/digital-air-speed-sensor-ms4525do"}]},{"title":"Embedded, Real-Time & Deterministic Systems — the substrate that makes control real","items":[{"id":"p1-emb-1","text":"White, Making Embedded Systems, Ch. 1–8 — hardware/software data flow, registers, interrupts, RTOS basics, embedded design patterns. Read for the MENTAL MODEL of how computation meets the physical world. You are learning to reason about embedded constraints, not to memorize syntax an AI can produce.","link":"https://www.oreilly.com/library/view/making-embedded-systems/9781449308889/"},{"id":"p1-emb-2","text":"Real-time scheduling theory: the Liu & Layland rate-monotonic bound U ≤ n(2^(1/n)−1), EDF vs RMS, priority inversion (the Mars Pathfinder case). Work three feasibility problems by hand; explain why determinism beats throughput in safety-critical loops.","link":"https://www.uio.no/studier/emner/matnat/ifi/INF5063/h09/undervisningsmateriale/rts-papers/liu-layland-73.pdf"},{"id":"hw-compute-1","text":"Map the two-real-time-domain architecture of YOUR stack: the ARKV6X flight controller (HARD real-time — PX4/ArduPilot on the NuttX RTOS, uORB shared-memory pub/sub at 100–1000 Hz, runs the state estimator and inner attitude/rate loops over the Pixhawk Autopilot Bus) versus the Jetson Orin Nano companion (SOFT real-time — Linux, runs VSLAM/vision/mission logic, bridged to PX4 via uXRCE-DDS). Write exactly which functions live on which side and why moving one across that line is a safety decision, not a convenience.","link":"https://docs.px4.io/main/en/concept/architecture.html"},{"id":"hw-compute-2","text":"Derive the message/latency budget for the Jetson↔ARKV6X link (MAVLink or uORB/DDS over the PAB bus): rate, payload size, serialization + transmission + processing time. Check it against the Liu & Layland schedulability bound and state, in seconds, your real margin to a missed deadline."},{"id":"hw-compute-5","text":"Measure real jitter on two things: the Jetson's vision-pipeline thread period and the ARKV6X's attitude-loop period (uorb top is your friend). Explain, with numbers, why the vision result must be allowed to arrive late or not at all without ever delaying the attitude loop — the hard/soft real-time boundary made concrete."},{"id":"hw-compute-6","text":"Treat the WiFi/Bluetooth telemetry link as a sampled, lossy channel in series with your MONITORING path (not your control path). Bound its achievable rate and induced delay, and write the one-line rule for what must NEVER be routed over it because the vehicle cannot be allowed to depend on it closing."},{"id":"hw-rf-1","text":"Model the ExpressLRS link (RadioMaster Pocket + RP3) as a sampled, occasionally-lossy communication channel placed in series with your control loop. Derive the effective added loop delay (link latency + failsafe timeout) and check it against the discretization lesson: what does this extra delay cost you in phase margin?","link":"https://www.expresslrs.org/"},{"id":"p1-emb-3","text":"The sampling bridge: Nyquist, aliasing, sample-and-hold, and discretization (Tustin / zero-order-hold). Hand-derive the discrete equivalent of a continuous PI controller and explain frequency warping — why a perfect continuous design can fail once sampled."},{"id":"p1-emb-5","text":"Numerical-integration honesty: compare Euler, RK4, and a stiff solver on one oscillatory system. Explain energy drift, stability regions, and why solver choice silently changes a result you might otherwise call 'validated'. The lesson here is epistemic."},{"id":"p1-emb-6","text":"Determinism & reproducibility: fixed-point vs floating-point, why bit-exact reproducibility matters for HIL replay and certification. Write the short argument for when you would accept floating point inside a safety loop and when you would not."}]},{"title":"Modern C++ for Deterministic Control — the low-latency execution layer","items":[{"id":"p1-cpp-1","text":"The real-time C++ discipline (Kormanyos, Real-Time C++ + the canonical CppCon real-time talks): why the hard real-time path forbids heap allocation, unbounded loops, exceptions on the hot path, and hidden syscalls. List the language features you must AVOID inside a control ISR/loop and state precisely why each one is non-deterministic. Learning what NOT to use is the real lesson.","link":"https://github.com/ckormanyos/real-time-cpp"},{"id":"p1-cpp-2","text":"RAII, stack and pre-allocated buffers, std::array vs std::vector, constexpr / compile-time computation: rewrite one small control routine to do ZERO dynamic allocation on the hot path. This deterministic-execution mindset is exactly what separates an embedded controls engineer from a scripter — and it is the half of the job AI cannot do for you because it requires reasoning about the target, not the syntax."},{"id":"p1-cpp-3","text":"Lock-free, single-writer/single-reader: model the Jetson 'brain' ↔ ARKV6X 'spine' handoff as a lock-free atomic shared-memory exchange rather than a blocking queue. Explain why a mutex on the control path can cause priority inversion and a missed deadline — the same Mars-Pathfinder failure, in your own stack. (Eclipse iceoryx is the production-grade reference for zero-copy IPC.)","link":"https://github.com/eclipse-iceoryx/iceoryx"},{"id":"p1-cpp-4","text":"Worst-case execution time (WCET) vs average: measure BOTH for one routine on the target and argue why a controls engineer budgets the worst case, not the mean. Tie it back to the Liu & Layland bound — a loop that fits 'on average' is a loop that will miss its deadline in the field."}]},{"title":"Estimation & Uncertainty — the filter running on your real hardware","items":[{"id":"p1-est-1","text":"Thrun, Burgard & Fox, Probabilistic Robotics, Ch. 2 — Recursive state estimation: derive the Bayes filter (predict + correct) by hand. Recognize it as 'a model corrected by data' — structurally identical to a control observer AND to a digital twin.","link":"http://www.probabilistic-robotics.org/"},{"id":"p1-est-2","text":"Probabilistic Robotics Ch. 3 — Gaussian filters: KF derivation, EKF linearization via Jacobians, UKF sigma points. Derive the scalar Kalman gain and explain it as an OPTIMAL trust-weighting between model and measurement. Own the intuition; let tools do the arithmetic."},{"id":"hw-compute-3","text":"Open the state estimator running on YOUR flight controller (PX4's EKF2 or ArduPilot's EKF3) and find, in the source, the literal predict step and correct step. Map each to the hand-derived Kalman gain above. This is not an analogy — it is the same fifteen lines of linear algebra you just derived, running on your hardware right now.","link":"https://docs.px4.io/main/en/advanced_config/tuning_the_ecl_ekf.html"},{"id":"hw-perc-2","text":"Identify the literal predict step (visual-odometry / IMU propagation) and correct step (feature re-observation) in whichever VSLAM stack you run on the Jetson, and map both onto the same Bayes filter. Run it once and watch the covariance shrink on a re-observed landmark — the abstraction made visible."},{"id":"p1-est-3","text":"Uncertainty propagation by hand: propagate a covariance through a nonlinear function two ways (linearization vs Monte Carlo) and explain when each is honest. This is the seed of uncertainty quantification in V&V — a thing most engineers skip and seniors never do."},{"id":"p1-est-4","text":"Labbe, Kalman and Bayesian Filters in Python (FREE): read the visual chapters for intuition; let the notebooks do the math while you own the interpretation of every plot.","link":"https://github.com/rlabbe/Kalman-and-Bayesian-Filters-in-Python"}]},{"title":"Build in Public — Visibility & Proof of Work","items":[{"id":"vis-p1-1","text":"LinkedIn carousel: 'I derived the thrust of my ducted fan from first principles before trusting a single datasheet.' Show the actuator-disc math, your predicted static thrust, the ≈2kg @ 70A manufacturer number, and the gap — with your one honest sentence about why they differ. Predicting hardware on paper is a rare, hireable signal."},{"id":"vis-p1-2","text":"Short essay (LinkedIn / Substack): 'The observer in a 1960s control textbook is the original digital twin — and the original adaptive controller.' One tight paragraph connecting Åström & Murray Ch. 7 to 2026 robot learning. Teaching the connection is how you become known for systems thinking."},{"id":"vis-p1-3","text":"Technical post: 'Hard vs soft real-time, explained on a $249 Jetson and a Pixhawk.' Which function lives where, why uORB on NuttX is deterministic and Linux is not, and why that boundary is a safety decision. Ground it in your measured jitter numbers."},{"id":"vis-p1-4","text":"Contrarian post: 'I'm learning to AVOID half of modern C++.' The real-time control mindset — no heap on the hot path, bounded WCET, lock-free handoffs — explained for a general engineering audience. Pin your zero-allocation routine as the proof."},{"id":"vis-p1-5","text":"Build-log thread (with photos): your hand-drawn phase portraits of the damped pendulum done BEFORE any solver. Frame it as 'learning to SEE stability.' Raw build logs are disproportionately trusted because they show process, not just polish."},{"id":"vis-p1-6","text":"Engage, don't just broadcast: comment with real substance on 3 posts from controls/robotics/embedded engineers you respect, and ask one sharp question. Relationships — not applications — source the highest-value work. Start the network now, in Phase 1."}]}],"milestones":["Can sketch the phase portrait and classify the equilibria of any 2D system without a computer","Derived the governing equations of three physical systems from first principles and nondimensionalized one","Can read a Bode/Nyquist plot and state gain and phase margins and what they mean physically","Proved stability of a nonlinear system with a Lyapunov function by hand, and can name the persistent-excitation link to adaptive control","Derived the full plant of the real airframe — propulsion ODE, battery sag, servo dynamics — and the measurement models of its real sensors (depth, airspeed, RTK heading)","Mapped the hard/soft real-time architecture of the ARKV6X (NuttX/uORB) vs Jetson (Linux) split, with measured jitter, and can defend the boundary","Wrote one control routine in deterministic modern C++ with zero hot-path allocation and a measured WCET","Derived the Bayes filter and Kalman gain by hand and found the literal predict/correct step in EKF2/EKF3 source on the real flight controller","Published the first 4+ visibility artifacts and began engaging deliberately with the field"]},{"id":"p2","label":"Phase 2","title":"Models, Simulation, the V-Model & Deterministic Control","months":"Months 3–5","color":"#F59E0B","icon":"◈","desc":"Turn first principles into the industrial workflow that automotive, aerospace, robotics and manufacturing actually pay for: model-based design and the MIL → SIL → PIL → HIL V-model, executed on your REAL ARKV6X/Jetson airframe with the control law written as deterministic modern C++. You build plant models across all five domains (including the full 6-DOF model of your EDF airframe), learn to extract models from data — linear AND nonlinear system identification, the direct basis for adaptive control — connect heterogeneous models with the vendor-neutral FMI/Modelica standard, and learn the THEORY of verification and validation: how to argue a simulation deserves to be believed. The deliverables are models, deterministic code, and validation arguments. The phase culminates in Signature Build 1.","sections":[{"title":"Model-Based Design & the V-Model (own the framework cold)","items":[{"id":"p2-mbd-1","text":"The four-stage V-model from first principles: MIL (model + plant in simulation), SIL (generated/host code vs simulated plant), PIL (target processor vs host plant), HIL (real firmware vs real-time plant). For one control function, write what NEW CLASS OF BUG each stage is designed to catch — and what it structurally cannot catch."},{"id":"hw-compute-4","text":"Write the MIL→SIL→PIL→HIL staging plan for THIS exact stack before building: MIL = PX4/ArduPilot SITL against a simulated plant; SIL = the same autopilot binary on the host against the simulated plant; PIL = the real ARKV6X hardware against a host-simulated plant over the PAB bus; HIL = the real ARKV6X against the real EDF/servo plant on a bench rig. Note that PX4's SITL lets the SAME controller code run on host, on the MCU, and in the loop — that portability IS the V-model. Name, for each stage, the bug class it newly exposes."},{"id":"p2-mbd-2","text":"MathWorks Simulink Onramp + Control System Onramp (FREE): build the block-diagram mental model — controller + plant + scope, step response, gain tuning. This is tool fluency only; the engineering thinking remains yours.","link":"https://www.mathworks.com/learn/tutorials/simulink-onramp.html"},{"id":"p2-mbd-3","text":"Code-generation honesty: understand how a model becomes C (rate groups, solver-in-the-loop vs solver-in-code) and why SIL output must be bit-compared to MIL within a stated tolerance. Write the acceptance criterion you would require before trusting auto-generated control code."},{"id":"p2-mbd-4","text":"HIL platforms conceptually — dSPACE SCALEXIO, NI VeriStand, Speedgoat: real-time plant execution, I/O fault insertion, deterministic step time. Write a one-page comparison of when each wins (AUTOSAR automotive vs ARINC/aerospace) and how an open FMI + RT-Linux (PREEMPT_RT) stack maps onto them.","link":"https://www.dspace.com/en/pub/home/products/systems/hil.cfm"},{"id":"p2-mbd-5","text":"Real-time determinism: what 'real-time' actually guarantees, worst-case vs average latency, why a HIL plant model must never miss its deadline. Explain the precise consequence of a single missed step in a HIL test campaign."}]},{"title":"Plant Modeling Across Domains — the cross-domain spine","items":[{"id":"p2-plant-1","text":"AUTOMOTIVE — derive the bicycle model and a quarter-car suspension model; identify the regimes where each stays valid. State which ADAS/AV/EV questions each can and cannot answer."},{"id":"p2-plant-2","text":"ROBOTICS — Siciliano et al., Robotics: Modelling, Planning and Control, Ch. 7 (Dynamics): derive the 2-link manipulator equations of motion via Lagrange; identify the inertia, Coriolis and gravity terms and what each does physically.","link":"https://link.springer.com/book/10.1007/978-1-84628-642-1"},{"id":"p2-plant-3","text":"AEROSPACE — Stevens, Lewis & Johnson, Aircraft Control and Simulation, Ch. 1–2: 6-DOF rigid-body equations, body vs inertial frames, the aerodynamic force/moment model. Set up the full state vector for your real EDF airframe, substituting the propulsion plant and servo dynamics you derived in Phase 1 for any generic thrust-curve placeholder.","link":"https://www.amazon.com/Aircraft-Control-Simulation-Dynamics-Autonomous/dp/1118870980"},{"id":"p2-plant-4","text":"MANUFACTURING/PROCESS — derive the first-order-plus-dead-time (FOPDT) model for a heated tank, the workhorse of process control. Explain why dead time is the single hardest thing to control and what it forces on your controller and your twin."},{"id":"p2-plant-5","text":"ENERGY/IoT — model a battery (equivalent-circuit RC — reuse your CNHL Thevenin model from Phase 1) and a motor drive; frame state-of-charge estimation explicitly as a digital-twin problem (a model continuously corrected by sparse, noisy measurements)."},{"id":"p2-plant-6","text":"Cross-domain synthesis essay: argue that the same five equations — rigid-body dynamics, RLC, mass-spring-damper, energy balance, and the queue — model roughly 80% of engineered systems. Map each domain above to its core equation. This synthesis is what makes a consultant portable across industries."}]},{"title":"System Identification & Data-Driven Modeling — Ljung + Brunton & Kutz (and the nonlinear case)","items":[{"id":"p2-sysid-1","text":"Ljung, System Identification: Theory for the User — the gray-box to black-box spectrum and the identification loop: experiment design, model structure, fit, validation. Understand persistent excitation (the same condition from Phase 1's adaptive-control reading), and why a poorly designed experiment yields a confidently WRONG model.","link":"https://www.mathworks.com/products/sysid.html"},{"id":"p2-sysid-2","text":"Design an identification experiment ON PAPER for one real system: choose the input signal (step / PRBS / chirp), the sampling rate, and the excitation amplitude — and justify each against the dynamics you expect. This experiment-design judgment is exactly the part that does not automate."},{"id":"p2-sysid-3","text":"Brunton & Kutz, Data-Driven Science and Engineering, Ch. 1 (SVD) & Ch. 4 (regression / model selection): the mathematics of extracting structure from data; bias-variance, cross-validation, and overfitting as the central modeling sin. Free book, code and lectures.","link":"http://databookuw.com/"},{"id":"p2-sysid-4","text":"Brunton & Kutz Ch. 7 — Data-driven dynamical systems (DMD, SINDy): discovering governing equations from data. Run SINDy on data from one Phase-2 plant model and check whether it RECOVERS the equations you derived by hand. The insight is the comparison, not the run."},{"id":"p2-sysid-5","text":"Model-validation discipline: split data into identification and validation sets; quantify fit with metrics you can defend (NRMSE, residual whiteness, input-residual cross-correlation). Write the argument for why 'good fit on training data' is never, by itself, validation."},{"id":"p2-sysid-6","text":"NONLINEAR system identification on your real airframe (NARX / Hammerstein-Wiener / SINDy): run a designed experiment on the EDF throttle→thrust and servo→attitude responses, fit a nonlinear model, and validate it out-of-sample. This identified nonlinear model IS the plant your adaptive controller is designed against in Phase 3 — and Phase 1's persistent-excitation condition is precisely why your input design decides whether the fit is trustworthy."}]},{"title":"Co-Simulation & Model Interoperability — FMI / Modelica (vendor-neutral)","items":[{"id":"p2-cosim-1","text":"The FMI standard (fmi-standard.org): Model Exchange vs Co-Simulation vs Scheduled Execution; the FMU as a portable, tool-agnostic model container used by Bosch, Siemens, dSPACE and NI. Read the spec overview; export one of your models as an FMU.","link":"https://fmi-standard.org/"},{"id":"p2-cosim-2","text":"Co-simulation theory: the communication step size, the master algorithm, and why naively coupling two solvers introduces error and instability at the interface. Explain the coupling-error / step-size tradeoff — the thing that quietly invalidates many multi-tool simulations."},{"id":"p2-cosim-3","text":"Modelica & acausal modeling: physical components connected by conservation laws rather than signal flow, and why acausal models stay reusable across studies. Build one multi-domain model (e.g. electro-mechanical — your motor + EDF) in OpenModelica.","link":"https://openmodelica.org/"},{"id":"p2-cosim-4","text":"INTO-CPS / Maestro — the open co-simulation toolchain for cyber-physical systems: orchestrate a multi-FMU co-simulation. This is the open-source backbone of digital-twin engineering and the cleanest way to learn co-simulation without vendor lock-in.","link":"https://into-cps.org/"},{"id":"p2-cosim-5","text":"Interface-design decision: for a system split into 3 FMUs, choose the coupling topology and the step sizes, and write the justification — including exactly what signals you would monitor to detect coupling-induced artifacts before they corrupt a result."}]},{"title":"Verification & Validation Theory — Sargent + NASA-STD-7009 (the rarest skill)","items":[{"id":"p2-vv-1","text":"Sargent, Verification and Validation of Simulation Models (FREE, Winter Simulation Conference): the Sargent circle — conceptual-model validity, computerized-model verification, operational validity, data validity. This is THE canonical mental model of V&V. Read it twice.","link":"https://www.informs-sim.org/wsc10papers/016.pdf"},{"id":"p2-vv-2","text":"NASA-STD-7009, Models and Simulations: the Credibility Assessment Scale, the PIRT (Phenomena Identification & Ranking Table) and PCMM (Predictive Capability Maturity Model). Build a PIRT for one of your models — rank which physics actually matter for the intended use.","link":"https://standards.nasa.gov/standard/NASA/NASA-STD-7009"},{"id":"p2-vv-3","text":"Verification vs validation, precisely: 'are we building the model right' (math/code correctness, solution verification, grid/step convergence) vs 'are we building the right model' (does it match reality for the intended use). Write three real examples where each one fails independently."},{"id":"p2-vv-4","text":"Uncertainty quantification basics: aleatory vs epistemic uncertainty. Propagate input uncertainty through one model and report a PREDICTION WITH ERROR BARS, not a point estimate. Explain why a digital twin without quantified uncertainty is a liability, not an asset."},{"id":"p2-vv-5","text":"Validation-experiment design: design (on paper) a physical experiment whose SOLE purpose is to validate one model prediction; specify the validation metric and the accept/reject threshold BEFORE seeing any data. Pre-committing the threshold is the antidote to fooling yourself."},{"id":"p2-vv-6","text":"The credibility argument (the consulting deliverable): write a 2-page 'why you should believe this simulation' memo for one model — intended use, assumptions, verification evidence, validation evidence, residual uncertainty, and the explicit boundary of validity. This is the single most valued and least common V&V artifact."}]},{"title":"Build in Public — Visibility & Proof of Work","items":[{"id":"vis-p2-1","text":"Flagship post + 60-sec screen recording: 'MIL → SIL → PIL → HIL on a real EDF airframe — and the first bug that only appeared on the target processor.' Tell the PIL-bug story (timing, fixed-point, or stack). The on-target bug story is catnip to controls and MBD hiring managers."},{"id":"vis-p2-2","text":"Essay: 'Why a good fit on training data is never validation — a system-ID horror story.' Use your own out-of-sample failure (or a deliberately overfit model) as the worked example. Intellectual honesty about your own model is the strongest trust signal you can send."},{"id":"vis-p2-3","text":"Carousel: 'Five equations model 80% of engineered systems.' Teaser of the cross-domain synthesis essay, one slide per equation with a domain example. This is your portability/consultant positioning, made shareable."},{"id":"vis-p2-4","text":"Open-source contribution: publish your airframe plant as a Reference-FMU export (FMPy-verified) with a README, and share the repo. A working FMU others can run is credibility-by-contribution that costs nothing to verify."},{"id":"vis-p2-5","text":"Build-log: the deterministic C++ controller — show the zero-allocation hot path next to the measured WCET, and the SIL-vs-MIL bit-comparison with the tolerance you set IN ADVANCE. Pre-committed tolerances signal seniority."},{"id":"vis-p2-6","text":"Submit a lightning-talk or local-meetup proposal on one Phase-2 idea (co-simulation coupling error, or the V-model on a hobby-budget airframe). Speaking forces clarity and starts the public record consultants and founders live on."}]}],"builds":[{"id":"proj1","title":"Signature Build 1 — Deterministic Plant Model & Full V-Model (MIL → SIL → PIL → HIL)","subtitle":"Pick your airframe. Model it from first principles, implement the controller in real-time C++, then take it through every stage of the V-model — and validate each stage against the last.","color":"#F59E0B","targetRoles":["Staff Controls Engineer","MBD / Simulink Lead","GNC Engineer (Aero/eVTOL)","HIL / Simulation Engineer","Embedded Controls (C++)"],"hardware":["Your EDF airframe: ARKV6X + Jetson Orin Nano (PAB) — the MIL→SIL→PIL→HIL target","Schübeler DS-30-AXI EDF + HET 2W-23 + Graupner 100A ESC + CNHL 5S pack — the propulsion plant from Phase 1","55kg servo (actuator-dynamics block); RadioMaster Pocket (ELRS) + RP3 — real stick input for PIL","Simulink or OpenModelica + Python; FMI tooling (FMPy / Reference FMUs); deterministic modern C++; a bench thrust stand for HIL-lite"],"why":"This is the spine of every model-based engineering role. A hiring manager or client sees someone who can derive a plant model, design a controller, implement it as deterministic C++, generate/cross-check code, and — critically — prove numerical equivalence at each V-model stage and document the validity boundary. Built on your REAL ARK Jetson / EDF airframe instead of a hypothetical system, it proves the modeling and validation JUDGMENT is yours end to end: AI can scaffold the plumbing, but it cannot decide the fidelity, design the validation experiment, or write the credibility argument. This single build proves you belong in a Staff Controls, MBD-lead, or GNC role.","modules":[{"name":"Module 1: Model — derive it, don't download it","tech":"Pen & paper, then Simulink / OpenModelica","tasks":[{"id":"m1-1","text":"Derive the governing equations of your airframe from first principles (Newton / Lagrange / energy balance / Kirchhoff). State every assumption explicitly — assumptions are where models lie. Fold in the propulsion ODE and servo model you derived in Phase 1 instead of a generic thrust curve."},{"id":"m1-2","text":"Choose the model fidelity and DEFEND it in a one-paragraph memo: which question does this fidelity answer, and what does it deliberately omit?"},{"id":"m1-3","text":"Nondimensionalize the model; identify the dominant dimensionless groups and what they tell you about regimes and scaling."},{"id":"m1-4","text":"Linearize about an operating point and analyze stability and bandwidth analytically — before any simulation confirms it."},{"id":"m1-5","text":"Document the validity regime: the exact input/state range where this model is trustworthy, and where it breaks."}]},{"name":"Module 2: MIL — model-in-the-loop","tech":"Simulink / Python + your derived plant","tasks":[{"id":"m2-1","text":"Build the closed-loop model (controller + plant) and reproduce the analytical step response you predicted in Module 1. Explain any discrepancy."},{"id":"m2-2","text":"Design the controller and tune it; record gain and phase margins and justify them against a stated robustness requirement."},{"id":"m2-3","text":"Derive the test cases from the requirements, not from the implementation. Write the requirement-to-test mapping by hand."},{"id":"m2-4","text":"Inject sensor/actuator imperfection (the real measurement models from Phase 1) and characterize how performance degrades."}]},{"name":"Module 3: SIL — software-in-the-loop (the deterministic C++ spine)","tech":"Embedded Coder / hand-written real-time C++ + host plant","tasks":[{"id":"m3-1","text":"Generate (or hand-write) the controller as C/C++ running on the host against the simulated plant."},{"id":"m3-4","text":"Write the controller as deterministic modern C++: zero heap on the hot path, bounded loops, a measured WCET. This is the 'spine' that will later host your adaptive/learned law (Phase 3). The discipline now is what makes the learning controller certifiable later."},{"id":"m3-2","text":"Bit-compare SIL output to MIL within a tolerance you set in advance; investigate and explain every deviation beyond it."},{"id":"m3-3","text":"Write the acceptance criterion: what numeric agreement must hold before you would trust this code in a vehicle or aircraft?"}]},{"name":"Module 4: PIL — processor-in-the-loop","tech":"ARKV6X / STM32 / Jetson + serial to host plant","tasks":[{"id":"m4-1","text":"Deploy the controller to the target; run it against the host plant model. On your real stack this is the ARKV6X against the Jetson-hosted plant over the PAB bus — and you can drive it with RECORDED RadioMaster Pocket stick input, replayed deterministically, for at least one run instead of a synthetic step."},{"id":"m4-2","text":"Measure real execution timing and jitter; check the loop against the Phase-1 schedulability bound and your WCET budget."},{"id":"m4-3","text":"Find and document the FIRST bug that appears only on target (timing, fixed-point, compiler, or stack). This is the whole point of PIL."}]},{"name":"Module 5: HIL (or HIL-lite) — hardware-in-the-loop","tech":"PREEMPT_RT Linux + FMU plant, or low-cost HIL rig","tasks":[{"id":"m5-1","text":"Run the real firmware against a real-time plant model (an FMU on a PREEMPT_RT Linux box is a legitimate HIL-lite rig)."},{"id":"m5-2","text":"Inject I/O faults (sensor dropout, stuck value, bus silence, ELRS failsafe) and verify the system reaches the correct fail-safe state within the timing spec."},{"id":"m5-3","text":"Document the fault-to-detection-to-recovery latency for each fault and compare it against the requirement."}]},{"name":"Module 6: V&V dossier — the artifact that makes it trustworthy","tech":"Markdown / PIRT / UQ","tasks":[{"id":"m6-1","text":"Build a PIRT: rank which physics matter for the intended use and which you justified omitting."},{"id":"m6-2","text":"Report one key prediction WITH quantified uncertainty (error bars), not a point estimate."},{"id":"m6-3","text":"Write the 2-page credibility argument: intended use, assumptions, verification evidence, validation evidence, residual uncertainty, validity boundary."},{"id":"m6-4","text":"Publish the README so a reviewer reaches your reasoning — model, decisions, evidence — in under five minutes."}]}]}],"milestones":["Can explain MIL/SIL/PIL/HIL and the exact bug class each stage catches, and map the open-source stack to dSPACE / NI","Derived plant models in all five domains (vehicle, robot, aircraft, process, energy) and stated each one's validity regime","Set up the full 6-DOF model of the real EDF airframe using the Phase-1 propulsion and servo plants","Designed a system-identification experiment and fit + validated a NONLINEAR model of the airframe out-of-sample — the plant for adaptive control","Exported and co-simulated FMUs; can explain co-simulation coupling error and the step-size tradeoff","Built a PIRT and wrote a NASA-STD-7009-style credibility argument for one model","Completed Signature Build 1: full V-model on the real airframe with a deterministic C++ controller and a documented validity boundary","Published the on-target-bug story and the Reference-FMU export; submitted a talk proposal"]},{"id":"p3","label":"Phase 3","title":"Digital Twins, Edge AI & Adaptive / Self-Learning Control","months":"Months 6–8","color":"#A855F7","icon":"◉","desc":"The synthesis that commands the highest fees and the most senior titles, aimed squarely at the frontier: self-learning electro-mechanical systems that adapt instead of break. You build a living digital twin that reconciles a model against live data; you deploy Edge AI — learned perception and control — onto the Jetson with TensorRT; and you design adaptive/learning-based control (MRAC, L1, sliding-mode, or an RL policy) while recognizing that the sim-to-real gap and the twin's model-vs-reality residual are the SAME problem. You learn test automation as ARCHITECTURE, the cross-domain safety standards (ISO 26262, DO-178C, IEC 61508, SOTIF) as one shared V-model, and the architect's language — requirements and MBSE. Two signature builds anchor the phase: a living twin, and a self-learning controller you can actually argue is safe.","sections":[{"title":"Digital Twin Engineering From First Principles — Fitzgerald, Gomes & Larsen (Springer 2024)","items":[{"id":"p3-dt-1","text":"The Engineering of Digital Twins, Part I — Foundations: the precise definitions (model vs simulation vs shadow vs twin), the business value case, and what actually makes a twin a TWIN — a live bidirectional link — rather than a fancy 3D render. The only rigorous first-principles text on the subject.","link":"https://link.springer.com/book/10.1007/978-3-031-66719-0"},{"id":"p3-dt-2","text":"Engineering of Digital Twins, Part II — Models and Data: which models and which data form the twin's core assets, the synchronization problem, and how imperfection and fault in BOTH the physical and digital worlds degrade twin quality. This is the hard part nobody puts in the brochure."},{"id":"p3-dt-3","text":"Engineering of Digital Twins, Part III–IV — connecting physical/digital and decision support: how a twin supports decisions and is maintained across its whole life. Write the through-life maintenance plan for one twin (who recalibrates it, when, and against what)."},{"id":"p3-dt-4","text":"Draw the five-layer twin architecture (data acquisition, transmission, digital model, data/model integration, services) for a SPECIFIC asset, and annotate each layer with the failure mode that silently breaks the twin at that layer."},{"id":"p3-dt-5","text":"Twin vs simulation vs observer: write the crisp distinction — a simulation predicts offline; an observer corrects a model with measurement inside a control loop; a twin is a life-long, queryable, bidirectionally-synced replica. Trace the lineage explicitly back to the Kalman observer from Phase 1."},{"id":"p3-dt-6","text":"Reconciliation & drift — the central twin problem: when the twin and reality disagree, which do you trust, and what do you update? Design the residual-monitoring and re-calibration policy for one twin. This question is what separates real twins from demos — and, you will see below, it is identical to the sim-to-real problem."}]},{"title":"Sensor Fusion & Reconciliation — your real navigation stack","items":[{"id":"hw-perc-5","text":"Write the one-page sensor-fusion OWNERSHIP memo: with RTK position+heading, VSLAM, IMU and airspeed all available at once, which estimator owns which state, and what is the explicit rule when two sources disagree (RTK heading vs VSLAM yaw; pitot airspeed vs GPS-ground-speed-minus-estimated-wind)? This is the twin's reconciliation problem on your real navigation stack instead of a hypothetical."},{"id":"hw-perc-6","text":"Design the RTK-lost contingency on paper: when the RTK fix drops, the estimate falls back toward VSLAM/IMU dead reckoning. Bound how fast that fallback's position error grows with time, and tie the bound explicitly to the Phase-1 lesson on chaos and the limits of long-horizon prediction."},{"id":"hw-rf-2","text":"Model RC-link-loss as a discrete event that switches the system into an autonomous/RTL mode. Write the hybrid automaton — continuous flight dynamics in each mode plus the discrete guard that triggers the switch — for arm / disarm / normal / failsafe. This is switched-system thinking, and it is exactly how certification authorities expect failsafe logic to be argued."},{"id":"p3-fuse-1","text":"Connect fusion to the twin: the fused state estimate IS the twin's best guess of reality, and the per-sensor innovations ARE the residuals the twin monitors. Write the half-page note tying the EKF innovation sequence to the twin's drift detector — same statistic, two names. Owning this equivalence is the senior insight."}]},{"title":"Edge AI — Inference & Learned Perception at the Edge","items":[{"id":"p3-edge-1","text":"Edge-inference economics: take one perception model (a detector, or learned depth refinement) and optimize it with TensorRT on the Jetson Orin Nano — FP16/INT8 quantization, layer fusion. Measure latency before/after and state the accuracy-vs-latency tradeoff in numbers. The senior framing: a learned model is just a measurement model with a latency and an error distribution — the same object you've modeled since Phase 1.","link":"https://developer.nvidia.com/tensorrt"},{"id":"p3-edge-2","text":"Where ML is ALLOWED in the loop: write the rule for what a learned model may and may not drive on your airframe, given its non-determinism and tail latency. Tie it to the Phase-1 hard/soft boundary — learned perception lives on the Jetson (soft real-time), never inside the ARKV6X attitude loop (hard real-time). This is exactly the question SOTIF (ISO 21448) exists to force."},{"id":"p3-edge-3","text":"Hardware-accelerated ROS 2 (NVIDIA Isaac ROS): stand up ONE accelerated perception node (VSLAM or detection) and integrate it with the PX4↔ROS 2 (uXRCE-DDS) bridge. The goal is to understand the data path and its timing end-to-end, not to master a GUI.","link":"https://nvidia-isaac-ros.github.io/"},{"id":"p3-edge-4","text":"Quantify the edge model as a sensor: give your TensorRT model a measurement model — bias, noise, latency, failure modes — exactly as you did for the IMU and airspeed sensor in Phase 1, and inject it into the twin. A learned component without a quantified error model is an unmanaged risk, not a feature."}]},{"title":"Adaptive & Self-Learning Control — beyond fixed gains","items":[{"id":"p3-adapt-1","text":"Model-Reference Adaptive Control (MRAC) — Åström & Wittenmark: design an MRAC law for one real loop whose plant parameters drift (battery sag / mass change / prop wear, from your Phase-1 list). Prove boundedness with a Lyapunov function (Phase 1), and identify the persistent-excitation condition required for parameter convergence (Phase 2). This is the canonical self-tuning controller, done on your hardware.","link":"https://www.amazon.com/Adaptive-Control-Second-Karl-Astrom/dp/0486462781"},{"id":"p3-adapt-2","text":"Compare the three roads to adaptation — gain scheduling vs MRAC/L1 adaptive vs a learned (RL) policy — for the SAME drifting plant. Write the one-page decision memo: what each buys, what each costs in verifiability, and which you would actually certify. This judgment is the rarest and best-paid skill in modern controls."},{"id":"p3-adapt-3","text":"Sim-to-real IS reconciliation: train (or fine-tune) one control or perception policy in NVIDIA Isaac Lab / Isaac Sim with domain randomization, deploy it to the Jetson, and MEASURE the sim-to-real gap. State the equivalence out loud — that gap is the twin's model-vs-reality residual (Section 1), and domain randomization is uncertainty quantification (Phase 2) by another name.","link":"https://developer.nvidia.com/isaac/lab"},{"id":"p3-adapt-4","text":"The stability guarantee for a learning system: write the strongest argument you can that your adaptive/learned controller will NOT destabilize the hardware — Lyapunov boundedness, a safety filter / control-barrier function, and a runtime monitor that falls back to the fixed-gain C++ spine from Build 1. The ability to BOUND a learning system's behavior is what makes 'self-learning control' employable in anything safety-critical."}]},{"title":"Test Automation as Architecture (not scripts)","items":[{"id":"p3-test-1","text":"Test strategy from first principles: the test pyramid for cyber-physical systems (unit, component, integration, system, field), open-loop replay vs closed-loop reactive testing, and the cost/fidelity curve. Write the strategy document for one system — the strategy is the deliverable, not the scripts."},{"id":"p3-test-2","text":"The test-oracle problem: why 'no crash / no exception' is never a sufficient oracle. Design a multi-criterion oracle (correctness + performance + quality/comfort + safety-margin) with thresholds set BEFORE the run. This is the deep idea in testing and it is pure judgment."},{"id":"p3-test-3","text":"Scenario coverage & the combinatorial explosion: equivalence partitioning, boundary-value analysis, and pairwise/combinatorial testing applied to a parameter space. Explain why exhaustive grid search is the amateur move and what to do instead."},{"id":"p3-test-4","text":"Design of Experiments for simulation: Latin Hypercube vs grid vs Sobol sequences. Choose a sampling plan for a 5-parameter scenario space and justify the sample count against the cost-per-run. This statistical judgment is the senior-simulation bar."},{"id":"p3-test-5","text":"Coverage that actually means something: distinguish code coverage (MC/DC) from scenario/ODD coverage from requirements coverage, and argue which one truly bounds risk for a cyber-physical system. Most engineers conflate these; you will not."},{"id":"p3-test-6","text":"Mutation testing as meta-validation: a test suite that cannot detect deliberately injected faults is not evidence of safety. Design (conceptually) 5 fault mutations for one system and predict which tests SHOULD catch each — then check. Testing the tests is the rare discipline."},{"id":"p3-test-7","text":"Requirements traceability: design a requirements-to-tests-to-scenarios traceability matrix and explain why an untraced requirement is an unmanaged risk. The architecture of the trace is the work; AI can fill cells, but it cannot decide what must be traced."}]},{"title":"Cross-Domain Safety & Certification — one shared V-model","items":[{"id":"p3-safe-1","text":"The common spine: IEC 61508 (the meta-standard) and how ISO 26262 (automotive), DO-178C (airborne software), EN 50128 (rail) and IEC 62304 (medical) all descend from the same V-model and integrity-level idea. Draw the ONE diagram that unifies them.","link":"https://www.iso.org/standard/68383.html"},{"id":"p3-safe-2","text":"Integrity levels mapped: ASIL A–D ~ DAL A–E ~ SIL 1–4 — what each demands of testing (structural coverage, independence, documentation). Build the cross-walk table from memory. This cross-domain fluency is precisely what commands premium consulting rates.","link":"https://www.rtca.org/"},{"id":"p3-safe-3","text":"Hazard analysis methods: HARA, FMEA/FMEDA, FTA, and STPA (Leveson's modern systems-theoretic approach). Run an STPA on one system's control structure and compare what it surfaces against a classical FMEA. STPA is the in-demand modern method.","link":"https://psas.scripts.mit.edu/home/"},{"id":"p3-safe-4","text":"SOTIF (ISO 21448) — safety of the intended function: the known/unknown by safe/unsafe quadrants, triggering conditions, and the Operational Design Domain. Explain why ML-based perception forced this standard into existence — and connect it directly to your Edge-AI and learned-control sections above. This is the live frontier of safety practice."},{"id":"p3-safe-5","text":"The assurance case — Goal Structuring Notation (GSN): structure a safety argument as claims supported by evidence. Write a small GSN assurance case for one safety goal. This is how senior safety engineers and consultants actually communicate trust."}]},{"title":"Requirements & Model-Based Systems Engineering — the architect's language","items":[{"id":"p3-mbse-1","text":"INCOSE Systems Engineering Handbook + NASA SE Handbook: the lifecycle, requirements engineering, and system-level verification vs validation. Write 10 well-formed, individually verifiable requirements for one system — and 10 deliberately bad ones, annotated with what makes each unverifiable.","link":"https://www.incose.org/"},{"id":"p3-mbse-2","text":"Friedenthal et al., A Practical Guide to SysML — the four pillars (structure, behavior, requirements, parametrics). Model one system in SysML so that requirements, behavior and tests are explicitly linked. Tool-agnostic; the value is the linked model, not the diagram.","link":"https://www.omg.org/spec/SysML/"},{"id":"p3-mbse-3","text":"MBSE vs document-based SE: write the honest argument for when a model-based approach pays for itself and when it is pure overhead. Consultants get asked this constantly; have the answer ready with examples on both sides."},{"id":"p3-mbse-4","text":"The digital thread: connect requirements, SysML model, simulation (FMU), test results and twin, conceptually. Draw the digital thread for one system and identify exactly where it tends to break in real organizations. This is the strategic, leadership-level view."}]},{"title":"Build in Public — Visibility & Proof of Work","items":[{"id":"vis-p3-1","text":"Flagship post (with a real plot from your airframe): 'The sim-to-real gap and a digital twin's model-vs-reality residual are the same problem.' Show the measured gap and the twin's residual side by side. This single reframe is the most senior idea in the whole roadmap — own it publicly."},{"id":"vis-p3-2","text":"Essay: 'Validating a learning system — applying SOTIF + STPA to an adaptive controller.' Walk through the assurance case for a self-learning controller. V&V-of-a-learning-system is the live frontier; teaching it positions you ahead of the market."},{"id":"vis-p3-3","text":"Short video demo: the living twin reconciling against live RTK / VSLAM / airspeed — show the residual stream and the drift detector firing. A working live twin (not a 3D render) is rare enough to travel on its own."},{"id":"vis-p3-4","text":"Carousel: 'Where ML is allowed in your control loop (and where it must never go).' The hard/soft real-time + SOTIF rule, illustrated on your two-domain Jetson/ARKV6X split. Practical, opinionated, and exactly what hiring managers want to see you reason about."},{"id":"vis-p3-5","text":"Benchmark post: TensorRT before/after latency on the Jetson, with the accuracy/latency tradeoff chart. Concrete numbers from real edge hardware beat any abstract claim about 'deploying AI at the edge.'"},{"id":"vis-p3-6","text":"Open contribution: publish one Isaac Lab / Isaac ROS scenario, or an FMI co-simulation example, that others can run. Credibility by contribution, on the exact platforms the highest-paying robotics teams use."},{"id":"vis-p3-7","text":"Decision post: 'I gave my drifting plant three ways to adapt — gain scheduling, MRAC, and an RL policy. Here's the one I'd actually certify.' Showing the tradeoff judgment (not just that it works) is what reads as staff/principal level."}]}],"builds":[{"id":"proj2","title":"Signature Build 2 — A Living Digital Twin with Reconciliation","subtitle":"A model + live (or replayed) telemetry + what-if queries + an anomaly/predictive signal — plus an honest answer to: when the twin disagrees with reality, which do you trust?","color":"#A855F7","targetRoles":["Digital Twin Architect","Digital Twin / Simulation Engineer","Industrial AI / Virtual Commissioning","Predictive Maintenance Lead","Autonomy M&S"],"hardware":["Your EDF airframe as the physical asset — Jetson + ARKV6X (PAB) telemetry; the FMU from Build 1 as the model core","Live ground truth: ArduSimple RTK position+heading + Holybro airspeed; live perception: OAK-D Lite VSLAM","A telemetry path (MAVLink / uORB / ROS 2 / replay) + a time-series store","Optional: Omniverse / Isaac Sim / Azure Digital Twins for the visualization & ontology layer"],"why":"Digital-twin architect and lead roles (and the core of high-margin industrial consulting) are scarce because the intersection of physics modeling, data, and reconciliation is rare. This build proves you can stand up a twin that is actually LIVE and HONEST — it ingests real data, exposes the residual between model and reality, has a re-calibration policy, and states what it can and cannot predict. Most portfolio 'digital twins' are 3D models with no live link; yours has the part that is genuinely hard, the same residual machinery your adaptive controller and sim-to-real workflow depend on, and the written reasoning that makes it defensible to a client.","modules":[{"name":"Module 1: The model core","tech":"FMU / OpenModelica / Python","tasks":[{"id":"t2m1-1","text":"Reuse or extend the Build-1 FMU as the twin's physics engine; define precisely which states the twin tracks and at what rate."},{"id":"t2m1-2","text":"State the twin's intended use in one sentence — monitoring, what-if, or prediction — because that choice drives every later decision."}]},{"name":"Module 2: The live link","tech":"MQTT / ROS 2 / replay + time-series DB","tasks":[{"id":"t2m2-1","text":"Ingest telemetry (live or replayed); align timestamps across sources and the model clock honestly."},{"id":"t2m2-2","text":"Handle dropouts and latency explicitly; decide what the twin does when data is missing, and document why."}]},{"name":"Module 3: Reconciliation — the heart","tech":"Residual analysis / parameter update","tasks":[{"id":"t2m3-1","text":"Compute the model-vs-reality residual continuously; choose what statistic of the residual you monitor and why. On your airframe this is the propulsion/6-DOF model's predicted state vs the RTK + VSLAM + airspeed measured state from Phase 1 — a real residual, and the same one your sim-to-real workflow measures."},{"id":"t2m3-2","text":"Design the drift detector: the condition under which the twin declares itself out of sync with reality."},{"id":"t2m3-3","text":"Design the re-calibration / parameter-update policy: when the twin and reality disagree, what gets updated, and what stays fixed?"},{"id":"t2m3-4","text":"Write the decision rule for which to trust — model or measurement — and the evidence behind it. This is the senior judgment buyers pay for, and it is the same rule your adaptive law needs."}]},{"name":"Module 4: Services","tech":"Query / anomaly / RUL","tasks":[{"id":"t2m4-1","text":"Implement one what-if query (e.g. 'if load increases 20%, what happens?') and report the answer with uncertainty."},{"id":"t2m4-2","text":"Implement one anomaly/fault signal derived from the residual, with a justified threshold."},{"id":"t2m4-3","text":"Produce one predictive-maintenance or remaining-useful-life estimate, and state honestly how far ahead it can be trusted."}]},{"name":"Module 5: Architecture & portability","tech":"draw.io / Markdown","tasks":[{"id":"t2m5-1","text":"Draw the five-layer twin architecture for this asset and annotate the per-layer failure mode."},{"id":"t2m5-2","text":"Write the one-page note on instantiating the SAME twin in a second domain — what transfers, what does not."}]},{"name":"Module 6: Validity, drift & accountability","tech":"Markdown / governance","tasks":[{"id":"t2m6-1","text":"State the boundary of validity and the explicit conditions under which the twin must NOT be trusted."},{"id":"t2m6-2","text":"Write the accountability note: who is responsible when the twin is wrong, and how a wrong twin is detected before it causes harm. This deliverable distinguishes a consultant from a hobbyist."}]}]},{"id":"proj3","title":"Signature Build 3 — A Self-Learning Electro-Mechanical System with a Credibility Case","subtitle":"An adaptive/learned controller on your real airframe — plus the coverage strategy, multi-criterion oracle, DOE-driven scenario campaign, and written assurance argument that make a learning system trustworthy.","color":"#06B6D4","targetRoles":["Adaptive / Learning-Based Controls","V&V Lead (ML/Autonomy)","SOTIF / Scenario Engineering","Robot Learning Engineer","Functional Safety (Autonomy)"],"hardware":["System-under-test: your adaptive/learned controller (MRAC or RL policy) on the ARKV6X/Jetson airframe, with the Build-1 C++ spine as fallback","A real scenario/parameter space: airspeed envelope, battery-sag and CG drift, RTK-loss windows, ELRS dropouts, sim-to-real distrib
